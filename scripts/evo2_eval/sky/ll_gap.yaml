# SkyPilot task: Evo2 LL-gap eval on a mixed-case CDS validation set
# (issue #131 follow-up). One model per `sky exec` invocation.
#
# No genome FASTA needed — sequences come straight from the HF dataset.
# Single H100, single process; the entry script keeps the LOCAL_RANK
# header so a torchrun scale-out is possible later without code changes.
#
# Reuse the cluster across iterations:
#   sky launch -c evo2-llgap scripts/evo2_eval/sky/ll_gap.yaml --env MODEL=evo2_1b_base
#   sky exec   evo2-llgap scripts/evo2_eval/sky/ll_gap.yaml     --env MODEL=evo2_7b_base
#   sky down   evo2-llgap   # only at session end

name: evo2-llgap

resources:
  accelerators: H100:1
  labels:
    project: dna
  # 256 GB to fit 40B weights (~80 GB FP8) plus the nvcr Docker base image.
  # Override --gpus GH200:1 at launch time to use a 96 GB GH200 (the
  # 80 GB H100 OOMs on 40B during model construction — confirmed empirically
  # 2026-04-28: 78.64 GB used, 553 MB free, even with expandable_segments).
  disk_size: 256

workdir: .

envs:
  MODEL: evo2_1b_base
  LIMIT: "1000"
  BATCH_SIZE: ""
  # Override to score a different mixed-case CDS-style dataset. Empty
  # falls back to the script's default (genomes-v5-validation-intervals-v5_255_255).
  DATASET: ""
  SPLIT: ""
  STREAMING: ""
  HF_TOKEN: ""

setup: |
  set -euxo pipefail
  # Same Docker base as traitgym.yaml — TE + flash-attn + CUDA 12.8
  # baked in. Pin biofoundation to main: PR #18 (compute_ll_clm) is merged.
  sudo docker pull nvcr.io/nvidia/pytorch:25.04-py3
  cat > /tmp/evo2.Dockerfile <<'EOF'
  FROM nvcr.io/nvidia/pytorch:25.04-py3
  RUN pip install --break-system-packages evo2
  RUN pip install --break-system-packages \
      git+https://github.com/Open-Athena/biofoundation.git@main \
      --use-deprecated=legacy-resolver
  RUN PIP_CONSTRAINT= pip install --break-system-packages -U "regex>=2025.10.22"
  WORKDIR /workspace
  EOF
  sudo docker build -t evo2-eval:latest -f /tmp/evo2.Dockerfile /tmp
  mkdir -p results

run: |
  set -euxo pipefail
  # Clean up child docker container on signal — sky cancel sends SIGTERM
  # to this script but not into the container; without the trap stale
  # containers keep pinning the GPU.
  CONTAINER_NAME="evo2-llgap-${MODEL}-$$"
  trap 'sudo docker rm -f "$CONTAINER_NAME" 2>/dev/null || true' EXIT INT TERM
  sudo docker run --rm --name "$CONTAINER_NAME" --gpus all --ipc=host --shm-size=16g \
    -v "$PWD":/workspace -w /workspace \
    -e MODEL="$MODEL" -e HF_TOKEN="${HF_TOKEN:-}" \
    -e LIMIT="${LIMIT:-1000}" -e BATCH_SIZE="${BATCH_SIZE:-}" \
    -e DATASET="${DATASET:-}" -e SPLIT="${SPLIT:-}" -e STREAMING="${STREAMING:-}" \
    -e CUDA_VISIBLE_DEVICES=0 \
    -e PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
    -e OMP_NUM_THREADS=8 \
    -e PYTHONPATH=/workspace/src \
    evo2-eval:latest \
    bash -c '
      set -euxo pipefail
      if [ -n "${HF_TOKEN:-}" ]; then export HUGGING_FACE_HUB_TOKEN="$HF_TOKEN"; fi
      LIMIT_ARG=""
      if [ -n "${LIMIT:-}" ]; then LIMIT_ARG="--limit ${LIMIT}"; fi
      BS_ARG=""
      if [ -n "${BATCH_SIZE:-}" ]; then BS_ARG="--batch-size ${BATCH_SIZE}"; fi
      DS_ARG=""
      if [ -n "${DATASET:-}" ]; then DS_ARG="--dataset ${DATASET}"; fi
      SPLIT_ARG=""
      if [ -n "${SPLIT:-}" ]; then SPLIT_ARG="--split ${SPLIT}"; fi
      STREAM_ARG=""
      if [ -n "${STREAMING:-}" ]; then STREAM_ARG="--streaming"; fi
      python scripts/evo2_eval/ll_gap.py \
        --model "$MODEL" \
        ${LIMIT_ARG} ${BS_ARG} ${DS_ARG} ${SPLIT_ARG} ${STREAM_ARG}
    '
