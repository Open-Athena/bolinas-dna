# SkyPilot task: Evo2 on the matched-pair leaderboards (#161 mendelian +
# #162 complex). Bundle-scoring path (LLR + next-token JSD, FWD+RC
# averaged) introduced in PR #184. Three model sizes — evo2_1b_base,
# evo2_7b, evo2_40b — all fit on a single GH200 (96 GB), so one cluster
# + `sky exec` per (model, dataset) is the recipe.
#
# Variant scoring no longer depends on biofoundation (vendored CLM
# subset in PR #182), so the image only pip-installs `evo2`.
#
# Default dataset is `mendelian_traits`; override with `--env DATASET=complex_traits`.
# See scripts/evo2_eval/README.md for the launch recipe.

name: evo2-eval

resources:
  # GH200 (96 GB) — fits evo2_40b unsharded; 1B/7B have ample headroom.
  # Note: Lambda is the cheapest reliable GH200 source ($2.29/hr on-demand,
  # us-east-3 / europe-central). Cloud left unpinned so SkyPilot can pick.
  # Lambda does NOT support image_id: docker:..., so we skip it entirely
  # and build our docker image at setup time.
  accelerators: GH200:1
  labels:
    project: dna
  disk_size: 256  # evo2_40b weights ~80 GB in FP8, plus genome + scratch

workdir: .

# Canonical BGZF GRCh38 reference (Ensembl release-115 — byte-identical
# sequence to release-113), pre-bgzipped with .fai + .gzi alongside.
# Files live locally under ~/genome_cache/ (one-time `aws s3 cp` from
# s3://oa-bolinas/data/genomes/homo_sapiens/GRCh38/ensembl-release-115/);
# sky rsyncs them to the cluster via file_mounts. Local cache avoids
# needing AWS creds on the Lambda cluster (cluster doesn't have IAM
# auth; the launching host does).
file_mounts:
  /home/ubuntu/sky_workdir/results/genome.fa.gz: ~/genome_cache/Homo_sapiens.GRCh38.dna_sm.primary_assembly.fa.gz
  /home/ubuntu/sky_workdir/results/genome.fa.gz.fai: ~/genome_cache/Homo_sapiens.GRCh38.dna_sm.primary_assembly.fa.gz.fai
  /home/ubuntu/sky_workdir/results/genome.fa.gz.gzi: ~/genome_cache/Homo_sapiens.GRCh38.dna_sm.primary_assembly.fa.gz.gzi

envs:
  MODEL: evo2_1b_base
  DATASET: mendelian_traits  # or `complex_traits`; drives HF path + output dir
  LIMIT: ""
  BATCH_SIZE: ""
  SKIP_SELF_TEST: ""
  NO_RC_AVG: ""    # empty = RC on (default); set to any non-empty to disable
  SUBSET: ""       # if set (e.g. "splicing"), filter the dataset to that subset
  OUTPUT_SUFFIX: ""  # optional suffix on output parquet filenames (avoid clobber)
  HF_TOKEN: ""

setup: |
  set -euxo pipefail
  # Docker-first setup. Lambda's base image has docker + nvidia-container-runtime
  # preinstalled. We use NVIDIA's pytorch image (TE + flash-attn + CUDA 12.8 +
  # matched torch already baked in) and layer evo2 on top. This avoids the
  # from-source hell we hit trying to build TE/flash-attn on Lambda's bare
  # image. NGC images are multi-arch and resolve to the aarch64 variant on
  # GH200 automatically.
  sudo docker pull nvcr.io/nvidia/pytorch:25.04-py3
  cat > /tmp/evo2.Dockerfile <<'EOF'
  FROM nvcr.io/nvidia/pytorch:25.04-py3
  RUN pip install --break-system-packages evo2
  # Runtime deps for the script-local Evo2 scoring path
  # (scripts/evo2_eval/_evo2_scoring.py + eval_matched_pair.py + metrics).
  # nvcr ships torch + numpy + pandas + an old datasets 2.x (incompatible
  # with newer fsspec; raises "Invalid pattern: '**' can only be an entire
  # path component"); we force-upgrade datasets and add pyfaidx, scipy,
  # scikit-learn (the metrics module pulls these). HF transformers /
  # accelerate are NOT needed — the local kernel skips HF Trainer entirely.
  # PIP_CONSTRAINT= bypass: nvcr's /etc/pip/constraint.txt pins dill==0.3.9
  # but datasets>=3.1 needs dill<0.3.9 → ResolutionImpossible without bypass.
  RUN PIP_CONSTRAINT= pip install --break-system-packages -U \
    "datasets>=3.1,<4" pyfaidx scipy scikit-learn
  # bolinas is installed via PYTHONPATH at run-time (pure Python, no build).
  WORKDIR /workspace
  EOF
  sudo docker build -t evo2-eval:latest -f /tmp/evo2.Dockerfile /tmp

run: |
  set -euxo pipefail
  # Clean up child docker container on signal (sky cancel sends SIGTERM to
  # this bash script but does NOT propagate into the container, leaking GPU
  # memory. The trap + --name ensures stale containers don't pin GPUs).
  CONTAINER_NAME="evo2-eval-${MODEL}-$$"
  trap 'sudo docker rm -f "$CONTAINER_NAME" 2>/dev/null || true' EXIT INT TERM
  # Single-GPU only: GH200 has one device and Vortex handles its own placement.
  # Don't launch via torchrun — Evo2/Vortex handles its own multi-GPU
  # sharding; HF Trainer DDP on top of Vortex breaks device placement.
  sudo docker run --rm --name "$CONTAINER_NAME" --gpus all --ipc=host --shm-size=16g \
    -v "$PWD":/workspace -w /workspace \
    -v "$HOME/.sky/file_mounts:$HOME/.sky/file_mounts:ro" \
    -e MODEL="$MODEL" -e HF_TOKEN="${HF_TOKEN:-}" \
    -e LIMIT="${LIMIT:-}" -e BATCH_SIZE="${BATCH_SIZE:-}" \
    -e SKIP_SELF_TEST="${SKIP_SELF_TEST:-}" \
    -e NO_RC_AVG="${NO_RC_AVG:-}" \
    -e SUBSET="${SUBSET:-}" \
    -e OUTPUT_SUFFIX="${OUTPUT_SUFFIX:-}" \
    -e DATASET="${DATASET:-mendelian_traits}" \
    -e CUDA_VISIBLE_DEVICES=0 \
    -e PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True \
    -e OMP_NUM_THREADS=8 \
    -e PYTHONPATH=/workspace/src \
    evo2-eval:latest \
    bash -c '
      set -euxo pipefail
      if [ -n "${HF_TOKEN:-}" ]; then export HUGGING_FACE_HUB_TOKEN="$HF_TOKEN"; fi
      if [ -z "${SKIP_SELF_TEST:-}" ]; then
        echo "=== evo2 self-test for ${MODEL} ==="
        python -m evo2.test.test_evo2 --model_name "${MODEL}" || true
        echo "=== end self-test ==="
      else
        echo "[skip] self-test disabled via SKIP_SELF_TEST"
      fi
      LIMIT_ARG=""
      if [ -n "${LIMIT:-}" ]; then LIMIT_ARG="--limit ${LIMIT}"; fi
      BS_ARG=""
      if [ -n "${BATCH_SIZE:-}" ]; then BS_ARG="--batch-size ${BATCH_SIZE}"; fi
      RC_ARG=""
      if [ -n "${NO_RC_AVG:-}" ]; then RC_ARG="--no-rc-avg"; fi
      SUBSET_ARG=""
      if [ -n "${SUBSET:-}" ]; then SUBSET_ARG="--subset ${SUBSET}"; fi
      DS_NAME="${DATASET:-mendelian_traits}"
      OUT="results/evo2_${DS_NAME}/${MODEL}_train${OUTPUT_SUFFIX:-}.parquet"
      OUT_METRICS="results/evo2_${DS_NAME}/${MODEL}_train${OUTPUT_SUFFIX:-}_metrics.parquet"
      python scripts/evo2_eval/eval_matched_pair.py \
        --model "$MODEL" \
        --split train \
        --dataset-name "$DS_NAME" \
        --genome-path results/genome.fa.gz \
        --output "$OUT" --output-metrics "$OUT_METRICS" \
        ${LIMIT_ARG} ${BS_ARG} ${RC_ARG} ${SUBSET_ARG}
    '
