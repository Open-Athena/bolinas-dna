name: Dashboard

# Builds the bolinas-dna leaderboard dashboard (Observable Framework site
# under `dashboard/`) and deploys it to GitHub Pages.
#
# Setup (one-time, by a repo admin):
#   1. Settings → Pages → Source: "GitHub Actions".
#   2. S3 access for the data loaders — pick one:
#       (a) Make the metrics prefix `s3://oa-bolinas/snakemake/.../results/metrics/`
#           public-read AND set a repo variable `BOLINAS_S3_ANON=1` (Settings
#           → Secrets and variables → Actions → Variables). The data loader
#           passes `aws_skip_signature=true` to polars. No AWS creds needed.
#       (b) Or, add `AWS_ACCESS_KEY_ID` + `AWS_SECRET_ACCESS_KEY` as repo
#           secrets (a read-only IAM user on the metrics prefix). Don't set
#           the BOLINAS_S3_ANON variable. The workflow picks them up below.

on:
  push:
    branches: [main]
    paths:
      - dashboard/**
      - src/bolinas/pipelines/evals/leaderboard.py
      - src/bolinas/pipelines/evals/models.py
      - src/bolinas/pipelines/evals/metrics.py
      - src/bolinas/pipelines/evals/gpn_star.py
      - .github/workflows/dashboard.yml
  workflow_dispatch:

# A single concurrent deploy at a time; cancel in-flight runs so we always
# ship the latest commit.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-2
      BOLINAS_S3_ANON: ${{ vars.BOLINAS_S3_ANON }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python deps
        run: uv sync --frozen

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install npm deps
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npx observable build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
