# Source of truth for every method on the leaderboard.
#
# Consumed by:
#   - `src/bolinas/pipelines/evals/leaderboard.py` — aggregates S3 metrics into
#     the long-form parquet the dashboard data loader writes.
#   - `dashboard/src/data/models.json.py` — emits a JSON build artifact for
#     the Observable Framework site.
#
# To add a method:
#   1. Append a YAML block here in registry order (entries with `datasets:` that
#      include the dataset show up on that dataset's leaderboard).
#   2. For `family: bolinas`, also add the model to
#      `snakemake/analysis/evals_v2/config/config.yaml` so the pipeline knows
#      where its checkpoint lives.
#   3. Run the pipeline → parquet on S3.
#   4. `git push`. Dashboard CI rebuilds and the new row shows up.
#
# Schema:
#   id           string  primary key; matches the S3 parquet name (bolinas) or
#                        the score_name / model filter value (conservation,
#                        gpn_star).
#   display      string  what the leaderboard table renders.
#   family       enum    bolinas | conservation | alphagenome | gpn_star.
#                        Drives parquet path + per-method filter in the library.
#   description  string  short tag for cards + (some) inline labels.
#   datasets     [str]   subset of {mendelian_traits, complex_traits, eqtl}.
#   training     dict    (bolinas only) data, params, window_size, objective.
#   experiment   int     (optional) experiment number — for grouping.
#   issue        url     (optional) GitHub issue tracking the experiment.
#   wandb        url     (optional) wandb run.
#   checkpoint   dict    (bolinas only) gcs and/or hf path to weights.
#   paper        url     (optional) reference paper (conservation/external).
#   msa          string  (gpn_star only) producer's MSA suffix (e.g. v100-200m).

