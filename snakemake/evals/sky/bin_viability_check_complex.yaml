name: bin-viability-check-complex

workdir: .

resources:
  infra: aws/us-east-2
  cpus: 4+
  memory: 32+
  disk_size: 20
  labels:
    project: dna

setup: |
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir
  uv sync --quiet

run: |
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir/snakemake/evals
  uv run python scratch/bin_viability_check_complex.py
