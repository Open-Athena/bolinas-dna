name: complex-traits-build

workdir: .

resources:
  infra: aws/us-east-2
  cpus: 8+
  memory: 64+
  disk_size: 200
  labels:
    project: dna

setup: |
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir
  uv sync --quiet

run: |
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir/snakemake/evals
  uv run snakemake \
    --cores 4 \
    -p \
    --rerun-triggers=mtime \
    -- results/dataset_unsplit/complex_traits.parquet
