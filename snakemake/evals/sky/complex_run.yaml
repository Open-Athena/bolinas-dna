name: complex-traits-build

workdir: .

resources:
  infra: aws/us-east-2
  cpus: 8+
  memory: 256+
  disk_size: 200
  labels:
    project: dna

setup: |
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir
  uv sync --quiet

run: |
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir/snakemake/evals
  # complex_traits_dataset's matching recipe changed (no gene-IDs in
  # CAT_BASE, no bin columns, k=9). Force-rerun the matching rule;
  # the QC rule downstream picks up its new input via mtime. Target is
  # the QC parquet, which depends on dataset_unsplit/complex_traits.parquet
  # — so we get both in one run.
  uv run snakemake \
    --cores 1 \
    -p \
    --rerun-triggers=mtime \
    --forcerun complex_traits_dataset \
    -- results/qc/complex_traits.parquet
