name: mendelian-traits-build

workdir: .

resources:
  infra: aws/us-east-2
  cpus: 8+
  memory: 256+
  disk_size: 200
  labels:
    project: dna

setup: |
  # uv + Python
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir
  uv sync --quiet

run: |
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir/snakemake/evals
  # gnomad_common's AF threshold changed (0.001 → 0.05) and
  # mendelian_traits_dataset's matching recipe changed (no gene-IDs in
  # CAT_BASE, no bin columns, k=9). Force both; downstream rules cascade
  # via mtime. Target is the QC parquet, which depends on
  # dataset_unsplit/mendelian_traits.parquet — so we get both in one run.
  uv run snakemake \
    --cores 1 \
    -p \
    --rerun-triggers=mtime \
    --forcerun gnomad_common mendelian_traits_dataset \
    -- results/qc/mendelian_traits.parquet
