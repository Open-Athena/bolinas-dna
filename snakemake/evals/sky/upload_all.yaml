name: evals-upload-all

workdir: .

resources:
  infra: aws/us-east-2
  cpus: 4+
  memory: 32+
  disk_size: 50
  labels:
    project: dna

# HuggingFace auth: pass the local token via sky's secrets mechanism so
# `HfApi()` on the cluster picks it up from $HF_TOKEN.
secrets:
  HF_TOKEN: null

setup: |
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir
  # `genome-s3` group installs s3fs so the materialize_eval_harness_dataset
  # rule can read the canonical GRCh38 FASTA directly from S3 via fsspec.
  uv sync --quiet --group genome-s3

run: |
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir
  # Ensure s3fs is present (sky exec doesn't re-run `setup:` on an existing
  # cluster, so the --group genome-s3 in setup above only applies on a
  # fresh launch). Idempotent — uv noops if already in sync.
  uv sync --quiet --group genome-s3
  cd ~/sky_workdir/snakemake/evals
  # `rule upload_all` cascades: split_dataset_by_chrom (for matched
  # datasets) + materialize_eval_harness_dataset (for the _harness_255
  # variant) + hf_upload (with README.md). Existing dataset_unsplit
  # parquets on S3 are the inputs; force-rerun split + materialize since
  # `dataset_unsplit/mendelian_traits.parquet` was rebuilt and is newer
  # than any pre-existing train/test split.
  uv run snakemake \
    --cores 1 \
    -p \
    --rerun-triggers=mtime \
    --forcerun split_dataset_by_chrom materialize_eval_harness_dataset hf_upload \
    -- upload_all
