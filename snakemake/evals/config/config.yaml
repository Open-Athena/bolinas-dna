# Genome reference (GRCh38)
genome_url: http://ftp.ensembl.org/pub/release-113/fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz

# HuggingFace repository prefix for dataset uploads.
# Final repo name is f"{output_hf_prefix}_{dataset}" (joined with underscore).
output_hf_prefix: bolinas-dna/evals

# Datasets to build and upload
datasets:
  - mendelian_traits
  - complex_traits
  - mendelian_traits_harness_256
  - complex_traits_harness_256

# ----- Shared trait-pipeline parameters -----
annotation_url: http://ftp.ensembl.org/pub/release-107/gtf/homo_sapiens/Homo_sapiens.GRCh38.107.chr.gtf.gz
consequences_repo: songlab/hg38-variant-consequences
gnomad_full_repo: songlab/gnomad-full
gnomad_min_AN: 25000
gnomad_common_min_AF: 0.05
tss_proximal_dist: 1000
exon_proximal_dist: 30
exclude_consequences:
  - transcript_ablation
  - splice_acceptor_variant
  - splice_donor_variant
  - stop_gained
  - frameshift_variant
  - stop_lost
  - start_lost
  - transcript_amplification
  - feature_elongation
  - feature_truncation
consequence_groups:
  splicing:
    - splice_donor_5th_base_variant
    - splice_region_variant
    - splice_donor_region_variant
    - splice_polypyrimidine_tract_variant
    - exon_proximal
  distal:
    - intergenic_variant
    - intron_variant
    - upstream_gene_variant
    - downstream_gene_variant
    - PLS
    - PLS_flank
    - pELS
    - pELS_flank
    - dELS
    - dELS_flank
    - CA-H3K4me3
    - CA-H3K4me3_flank
    - CA-CTCF
    - CA-CTCF_flank
    - CA-TF
    - CA-TF_flank
    - CA
    - CA_flank
    - TF
    - TF_flank

# Display name + ordering for the values that end up in `consequence_group`
# (which are either a key from `consequence_groups` above, or one of the
# single-consequence categories left unmapped by `build_dataset`).
consequence_group_order:
  missense_variant: Missense
  distal: Distal
  splicing: Splicing
  tss_proximal: Promoter
  5_prime_UTR_variant: 5' UTR
  non_coding_transcript_exon_variant: ncRNA
  3_prime_UTR_variant: 3' UTR
  synonymous_variant: Synonymous

# ----- Mendelian-traits-specific -----
mendelian_traits:
  AF_threshold: 0.001
  hgmd_url: https://sei-files.s3.amazonaws.com/pathogenic_mutations.tar.gz
  smedley_url: https://ars.els-cdn.com/content/image/1-s2.0-S0002929716302786-mmc2.xlsx
  clinvar_release: "20251019"
  submission_summary_date: "2025-10"

# ----- Complex-traits-specific -----
complex_traits:
  finemapping_repo: gonzalobenegas/finucane-ukbb-finemapping
  ldscore_s3: s3://pan-ukb-us-east-1/ld_release/UKBB.EUR.ldscore.ht
  pip_pos_threshold: 0.9
  pip_neg_threshold: 0.01
