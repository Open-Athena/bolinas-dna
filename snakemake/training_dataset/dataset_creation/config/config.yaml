genomes_path: config/genomes.parquet

shuffle_seed: 42

validation:
    max_samples: 16384
    genome: GCF_000001405.40
    conservation_bigwig: results/conservation/cactus241way.phyloP.bw
    phylop_threshold: 2.27
    seed: 42

n_shards: 64

add_rc: true

intervals:
    training:
        - v5/255/128 # CDS
        - v1/255/128 # upstream
        - v15/255/128 # downstream
    validation: # step = window for max diversity
        - v5/255/255
        - v1/255/255
        - v15/255/255

genome_sets:
    - name: animals
      rank_key: kingdom
      rank_value: Metazoa
    - name: vertebrates
      rank_key: phylum
      rank_value: Chordata
    - name: mammals
      rank_key: class
      rank_value: Mammalia
    - name: primates
      rank_key: order
      rank_value: Primates
    - name: humans
      rank_key: species
      rank_value: "Homo sapiens"

output_hf_prefix: bolinas-dna/genomes-v5

# Subset of genomes for one-off analysis (6 priority + 30 random, seed=42)
genome_subset_analysis:
    - GCF_000001405.40 # Human
    - GCF_000001635.27 # Mouse
    - GCF_000001215.4 # Drosophila
    - GCF_000002985.6 # C. elegans
    - GCF_016699485.2 # Chicken
    - GCF_049306965.1 # Zebrafish
