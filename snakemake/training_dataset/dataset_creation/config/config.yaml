functional_regions:
    - cds
    - 5_prime_utr
    - 3_prime_utr
    - promoters_mRNA/256/256
    - ncrna_exons

# Color palette for functional regions (consistent across all plots)
region_colors:
    cds: "#66c2a5"
    5_prime_utr: "#fc8d62"
    3_prime_utr: "#8da0cb"
    promoters: "#e78ac3"
    promoters_mRNA/256/256: "#e78ac3"
    ncrna_exons: "#a6d854"

# Display labels for functional regions
region_labels:
    cds: "CDS"
    5_prime_utr: "5' UTR"
    3_prime_utr: "3' UTR"
    promoters: "Promoter"
    promoters_mRNA/256/256: "Promoter"
    ncrna_exons: "ncRNA"

# Conservation analysis settings
# Cutoff from: Christmas, Matthew J., et al. "Evolutionary constraint and
# innovation across hundreds of placental mammals." Science 380.6643 (2023): eabn3943.
conservation:
    phylop_cutoff: 2.27 # bases with phyloP >= this value are considered conserved

# Promoter variants for comparison plot
promoter_comparison_regions:
    - promoters_mRNA/256/256
    - promoters_mRNA/2048/2048
    - promoters/256/256
    - promoters/2048/2048

enhancer_prediction:
    checkpoint: "s3://oa-bolinas/snakemake/enhancer_classification/results/model/finetune/v8b/best.ckpt"
    window_size: 255
    step_size: 128
    batch_size: 1024
    num_workers: 4
    threshold: 0.0  # logit threshold for recipe v19 (set after genome-wide analysis)

enhancer_prediction_segmentation:
    checkpoint: "s3://oa-bolinas/snakemake/enhancer_classification/results/segmentation/model/xfmr2_w64k_s42_full/seg_v1_64k/best.ckpt"
    window_size: 65536
    bin_size: 128
    batch_size: 32
    num_workers: 4
    # One species per mammalian order (23 orders, seed=42).
    genomes:
        - GCF_050624435.1   # Tenrec ecaudatus (Afrosoricida)
        - GCF_025265405.1   # Mesoplodon densirostris (Artiodactyla)
        - GCF_008692635.1   # Crocuta crocuta (Carnivora)
