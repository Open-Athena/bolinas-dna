        - GCF_964237555.1   # Oryctolagus cuniculus (Lagomorpha)
        - GCF_000299155.1   # Elephantulus edwardii (Macroscelidea)
        - GCF_019393635.1   # Dromiciops gliroides (Microbiotheria)
