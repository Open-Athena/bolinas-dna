# SkyPilot task: run the conservation_eval pipeline on a CPU node.
#
# Pipeline pulls per-track bigWigs (cached in S3 from prior runs) and scores
# variants from the HF eval datasets via single-base lookup. After the
# evals_v2 mirror (PR #194/#195 alignment): train split only, 2 datasets ×
# 7 tracks = 14 score_variants jobs + 2 aggregate_metrics jobs. The HF
# dataset commit is pinned per-dataset via `hf_revision` in
# config/config.yaml, so snakemake's `params:` hash triggers reruns when
# the SHA changes.
#
# Bootstrap (one-shot, after the PA→AUPRC migration): the existing S3
# outputs are from the legacy PairwiseAccuracy pipeline and lack recorded
# `params:` provenance, so snakemake sees them as "up to date" until they
# are force-rerun once. Pass the env var on first launch:
#
#   sky launch snakemake/conservation_eval/sky/run.yaml -c conservation-eval \
#       --env SNAKEMAKE_ARGS="--forcerun score_variants"
#
# Subsequent launches (re-running on a new hf_revision, etc.) can drop the
# env var; the recorded `params:` hash will trigger reruns automatically.

name: conservation-eval

resources:
    infra: aws/us-east-2
    cpus: 4+
    memory: 16+
    disk_size: 100
    labels:
        project: dna

workdir: .

envs:
    SNAKEMAKE_ARGS: ""           # extra snakemake args (e.g. --forcerun score_variants)

setup: |
    set -euxo pipefail

    if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
    fi
    export PATH="$HOME/.local/bin:$PATH"

    uv sync

run: |
    set -euxo pipefail
    export PATH="$HOME/.local/bin:$PATH"

    cd snakemake/conservation_eval

    # `--cores 1` because score_variants loads a ~10 GB bigWig per task; with
    # the profile default of 4 parallel cores on a 16 GB box that would
    # OOM one of the parallel jobs. Aggregation (AUPRC bootstrap) is cheap.
    uv run --project ../.. snakemake \
        --profile workflow/profiles/default \
        --cores 1 \
        --printshellcmds \
        --rerun-incomplete \
        $SNAKEMAKE_ARGS
