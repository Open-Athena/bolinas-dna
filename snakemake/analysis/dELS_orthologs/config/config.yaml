# dELS_orthologs hello-world: how do hg38 ZRS dELS map onto mm10?
# See README.md and snakemake/analysis/dELS_orthologs/workflow/Snakefile.

# Restrict the hg38 query side to a single Registry-V4 cCRE class (e.g.
# `"dELS"`), or leave as `null` to use every class. When null, the query
# set is every hg38 cCRE with a gold-standard partner; reports that need
# to break out by class (e.g. `recall_by_class_and_conservation`) read
# the class from the query parquet.
cre_class: null

cre_urls:
    hg38: "https://downloads.wenglab.org/Registry-V4/GRCh38-cCREs.bed"
    mm10: "https://downloads.wenglab.org/Registry-V4/mm10-cCREs.bed"

ortholog_url: "https://downloads.wenglab.org/hg38-mm10-Homologous.tsv"

# UCSC 2bit (cCRE BEDs use UCSC `chr*` chrom names).
genome_urls:
    hg38: "https://hgdownload.soe.ucsc.edu/goldenPath/hg38/bigZips/hg38.2bit"
    mm10: "https://hgdownload.soe.ucsc.edu/goldenPath/mm10/bigZips/mm10.2bit"

# Asymmetric search: query side = ZRS biological coords (no flank); target side
# = whole mm10 chromosome containing ZRS. Each species supports either windowed
# (chrom + start + end + flank_bp) or whole-chromosome (whole_chrom: true) mode.
# Coordinates from snakemake/enhancer_classification/config/config.yaml lines 555-572.
search_region:
    hg38:
        whole_genome: true
        # ZRS hello-world coords kept for reference; ignored when
        # whole_genome is true:
        #   chrom: "chr7"  start: 156790115  end: 156793672
        #   name: "ZRS_human"  flank_bp: 0
    mm10:
        whole_genome: true
        # whole-chromosome and windowed alternatives (each ignored when
        # whole_genome is true):
        #   chrom: "chr5"
        #   whole_chrom: true
        #   start: 29312497  end: 29318634  flank_bp: 100000

# Restrict the hg38 query to these specific accessions. Comment out or set to
# null to use every dELS in the hg38 search region.
query_accessions: null

# mmseqs2 nucleotide search at -k 15 needs ~50-80 GB resident for whole-mm10
# targets (empty k-mer table ~8 GB + occupied lists scaling with target size).
# Only enable on a large-memory instance (r6i.8xlarge, 256 GB, or similar).
aligners:
    - mmseqs2
    # Other variants from earlier sweeps (kept in minimap2_variants below):
    # - minimap2_map-ont
    # - minimap2_map-ont_k13
    # - minimap2_asm20_tuned
    - minimap2_map-ont_k11  # k-sweep winner; re-run on the same hardware for side-by-side
    # Variants kept in minimap2_variants for later cross-axis experiments:
    # - minimap2_map-ont_k11_B3
    # - minimap2_map-ont_k11_s20m20
    # - minimap2_map-ont_k9  # k=9 seeds too densely; minimap2 hit-lists blow
    #   up and alignment phase takes 20+ min on whole mm10. Dropped for now;
    #   would need smaller target or a bigger box to explore.

# Flag strings for each `minimap2_*` aligner. The align rule matches any
# aligner name with the `minimap2_.+` wildcard constraint and pulls flags
# from this dict.
minimap2_variants:
    minimap2_map-ont: "-cx map-ont --secondary=yes -N 50"
    minimap2_map-ont_k13: "-cx map-ont -k 13 --secondary=yes -N 50"
    minimap2_map-ont_k11: "-cx map-ont -k 11 --secondary=yes -N 50"
    minimap2_asm20_tuned: "-cx asm20 -B 4 -O 4,24 -E 2,1 --secondary=yes -N 50"
    # Second-round tuning at the k=11 winner:
    # - B 3 = softer mismatch penalty (default map-ont is -B 5)
    # - s 20 -m 20 = accept weaker alignments (defaults are -s 40 -m 40)
    # - k 9 = even denser seeding (4^9 = 262K possible k-mers; fits on 15 GB)
    minimap2_map-ont_k11_B3: "-cx map-ont -k 11 -B 3 --secondary=yes -N 50"
    minimap2_map-ont_k11_s20m20: "-cx map-ont -k 11 -s 20 -m 20 --secondary=yes -N 50"
    minimap2_map-ont_k9: "-cx map-ont -k 9 --secondary=yes -N 50"
    # Genome-vs-genome regimes. map-ont -k 11 at whole-genome scale causes
    # minimap2 to abort (SIGABRT, likely too many seed-chain candidates
    # across gigabase queries). asm20 is the preset for assembly-vs-assembly
    # but default k=19 is too strict for cross-species; -k 15 is the
    # compromise: genome-alignment preset with cross-species-sensitive
    # seeding.
    minimap2_genome: "-cx asm20 -k 15 --secondary=yes -N 50"
    minimap2_genome_asm20: "-cx asm20 --secondary=yes -N 50"

mmseqs2:
    sensitivity: 7.5
    max_accept: 100

# Flag strings for each `fastga_*` aligner. The `fastga_align` rule matches any
# aligner name with the `fastga(_.*)?` wildcard constraint and pulls flags
# from this dict. Entries cover:
# - `-s100`: allow <1 kb alignments (default 1000 rejects every 300-500 bp cCRE).
# - `-i.55`: float 0.55 is FASTGA's hardcoded lower bound (default 0.7 too strict
#   for ~75% cross-species identity tail).
# - `-c<N>`: chain-coverage percentage; default 85 demands a long chain, often
#   unavailable for short queries.
# - `-l<N>`: minimum seed length; default 100 nearly equals the median cCRE.
fastga_variants:
    fastga: "-s100 -i.55"
    fastga_c50: "-s100 -i.55 -c50"
    fastga_l50: "-s100 -i.55 -l50"
    fastga_c50_l50: "-s100 -i.55 -c50 -l50"
    # Native-regime (whole-genome vs whole-genome). Same flag defaults as
    # the cCRE-as-queries variant above, to isolate the input framing effect.
    fastga_genome: "-s100 -i.55"
    # Whole-mm10 nucleotide index + occupied-list growth needs headroom above
    # the 15 GB dev-box budget. Override on the cloud profile (r6i.8xlarge, 256 GB).
    mem_mb: 14000
    split_memory_limit: "12G"

# Drop hg38 dELS whose soft-masked (lowercase, repeat-annotated) fraction
# exceeds this threshold. mmseqs2 with `--mask-lower-case 1` has no k-mer
# seeds in heavily-masked sequence, so unfiltered queries cannot align even
# to themselves. Only applied to the query side.
max_soft_masked_frac: 0.5

# How many top-bits hits to keep per query in the per-query report.
report_top_k: 10

# Conservation tracks used to stratify recall@k. Each query dELS is scored
# by the fraction of bases in its interval whose track value is >= threshold;
# queries are then bucketed by that fraction into equal-frequency bins.
# Threshold is from the Zoonomia 241-way mammal paper (Sullivan et al.,
# Science 2023, doi:10.1126/science.abn2937).
conservation:
    hg38:
        # Cactus 241-way mammalian phyloP (hg38 reference). Most relevant
        # for hg38↔mm10 since mouse is in the 241 species.
        phyloP_241m:
            url: "https://hgdownload.soe.ucsc.edu/goldenPath/hg38/cactus241way/cactus241way.phyloP.bw"
            threshold: 2.27  # Sullivan et al. 2023 Zoonomia threshold
        # 43-primate phastCons from the Zoonomia/Cactus hub. Note the
        # upstream filename says phyloP but the file is phastCons (threshold
        # is in 0–1 range). Narrower timescale — primates only, no mouse.
        phastCons_43p:
            url: "https://cgl.gi.ucsc.edu/data/cactus/zoonomia-2021-track-hub/hg38/phyloPPrimates.bigWig"
            threshold: 0.961

# Tracks to stratify recall by (subset of `conservation.hg38` keys above).
stratify_by:
    - phyloP_241m
    - phastCons_43p

# Number of equal-frequency bins over the per-query "% bases >= threshold"
# score (deciles = 10) for the quantile-binned reports.
n_conservation_bins: 10

# Width of the fixed-size bins for the fixed-bin report (0.1 = 10%).
# Bins span [0, width), [width, 2*width), ..., [(n-1)*width, n*width].
conservation_bin_width: 0.10

# Symmetric bp flanks to apply to each query dELS before handing the FASTA
# to the aligner. Positive = expand each side by N bp (longer query);
# negative = contract each side (shorter query; cCREs that would become
# non-positive-length are skipped).
# The repeat-mask filter is applied to the ORIGINAL cCRE (not the flanked
# interval), so the surviving accession set before shrinkage is stable
# across flank values. Conservation scoring likewise uses the original
# cCRE coords.
query_flanks_bp:
    - -50
    - 0
    - 100
    # - 250  # OOM on 15 GB box: 424K × ~900 bp mean × 50 secondaries
    #   blows past the minimap2 alignment-buffer budget. Uncomment once
    #   we have a 32+ GB instance, or drop --secondary=yes first.
