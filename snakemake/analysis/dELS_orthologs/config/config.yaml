# dELS_orthologs hello-world: how do hg38 ZRS dELS map onto mm10?
# See README.md and snakemake/analysis/dELS_orthologs/workflow/Snakefile.

# Restrict the hg38 query side to a single Registry-V4 cCRE class. Per the
# tracking issue (Open-Athena/bolinas-dna#120), this analysis is dELS-only.
# Note: not applied to mm10 — the mm10 candidate pool is intentionally
# class-agnostic so we can see hits to e.g. mouse `CA` cCREs that are the
# orthologous element on the mouse side (see issue body).
cre_class: "dELS"

cre_urls:
    hg38: "https://downloads.wenglab.org/Registry-V4/GRCh38-cCREs.bed"
    mm10: "https://downloads.wenglab.org/Registry-V4/mm10-cCREs.bed"

ortholog_url: "https://downloads.wenglab.org/hg38-mm10-Homologous.tsv"

# UCSC 2bit (cCRE BEDs use UCSC `chr*` chrom names).
genome_urls:
    hg38: "https://hgdownload.soe.ucsc.edu/goldenPath/hg38/bigZips/hg38.2bit"
    mm10: "https://hgdownload.soe.ucsc.edu/goldenPath/mm10/bigZips/mm10.2bit"

# Asymmetric search: query side = ZRS biological coords (no flank); target side
# = whole mm10 chromosome containing ZRS. Each species supports either windowed
# (chrom + start + end + flank_bp) or whole-chromosome (whole_chrom: true) mode.
# Coordinates from snakemake/enhancer_classification/config/config.yaml lines 555-572.
search_region:
    hg38:
        chrom: "chr7"
        start: 156790115
        end: 156793672
        name: "ZRS_human"
        flank_bp: 0
    mm10:
        whole_genome: true
        # whole-chromosome and windowed alternatives (each ignored when
        # whole_genome is true):
        #   chrom: "chr5"
        #   whole_chrom: true
        #   start: 29312497  end: 29318634  flank_bp: 100000

# Restrict the hg38 query to these specific accessions. Comment out or set to
# null to use every dELS in the hg38 search region.
query_accessions: null

# mmseqs2 nucleotide search at -k 15 needs ~50-80 GB resident for whole-mm10
# targets (empty k-mer table ~8 GB + occupied lists scaling with target size).
# The current 15 GB dev box can't fit it; comment back in once we move to a
# bigger instance (r6i.8xlarge or similar — see issue #120 thread for sizing).
aligners:
    # - mmseqs2
    - minimap2

mmseqs2:
    sensitivity: 7.5
    max_accept: 100

# Drop hg38 dELS whose soft-masked (lowercase, repeat-annotated) fraction
# exceeds this threshold. mmseqs2 with `--mask-lower-case 1` has no k-mer
# seeds in heavily-masked sequence, so unfiltered queries cannot align even
# to themselves. Only applied to the query side.
max_soft_masked_frac: 0.5

# How many top-bits hits to keep per query in the per-query report.
report_top_k: 10
