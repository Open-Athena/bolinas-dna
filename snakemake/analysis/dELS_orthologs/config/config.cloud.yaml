# Overrides for large-memory cloud instances (r6i.8xlarge, 256 GB).
# Layered on top of config/config.yaml via
#   snakemake --configfile config/config.yaml --configfile config/config.cloud.yaml
# Pair with `--resources mem_mb=220000` on the CLI so the scheduler knows the
# profile's total memory budget.
mmseqs2:
    sensitivity: 7.5
    max_accept: 100
    mem_mb: 220000
    split_memory_limit: "220G"

# For the lastz BFS iteration, restrict to flank=0 and a smaller aligner set
# so we don't multiply lastz's runtime across flanks it wasn't proven on yet.
# minimap2_map-ont_k11 runs at the same flank for fresh same-hardware reference.
query_flanks_bp:
    - 0

aligners:
    - lastz_hoxd55  # DFS iteration on the BFS winner — HOXD55 is more permissive than HOXD70
