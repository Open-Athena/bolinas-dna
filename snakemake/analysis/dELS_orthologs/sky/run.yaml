name: dels-orthologs-mmseqs2

# One-shot run of the dELS_orthologs pipeline on a big-memory instance so
# mmseqs2 nucleotide search fits against the whole mm10 genome (~50-80 GB
# resident at -k 15). See issue #120 for context.

resources:
  # us-east-2 matches the account's main working region + same-region S3 for
  # any future cached-data patterns (e.g. genomes, mmseqs indexes).
  infra: aws/us-east-2
  instance_type: r6i.8xlarge   # 32 vCPU, 256 GB RAM
  disk_size: 300               # genomes + bigwigs + mmseqs index + conda envs
  labels:
    project: dna               # cost-attribution tag on the AWS EC2 instance

workdir: .

setup: |
  set -euxo pipefail

  # Miniforge3 provides conda + mamba, required by `snakemake --use-conda`.
  if [ ! -d "$HOME/miniforge3" ]; then
    curl -fsSL -o /tmp/miniforge.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
    bash /tmp/miniforge.sh -b -p "$HOME/miniforge3"
    rm /tmp/miniforge.sh
  fi

  # uv manages the project's Python deps (polars, bioframe, snakemake, ...).
  if ! command -v uv >/dev/null 2>&1; then
    curl -LsSf https://astral.sh/uv/install.sh | sh
  fi

  # Persist PATH for future non-login shells (rsync pulls, ad-hoc ssh).
  grep -q 'miniforge3/bin' "$HOME/.bashrc" || \
    echo 'export PATH="$HOME/miniforge3/bin:$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"

  # Install Python deps from uv.lock.
  export PATH="$HOME/.local/bin:$PATH"
  uv sync

run: |
  set -euxo pipefail

  # The SkyPilot AWS AMI ships a legacy conda 23.11.0 under ~/miniconda3 and
  # its `conda init` block in ~/.bashrc can shadow our miniforge3 install at
  # task runtime. Source miniforge3's profile.d/conda.sh explicitly so
  # $CONDA_EXE and $PATH both point at conda 26.x (snakemake 9.x requires
  # >= 24.7.1).
  source "$HOME/miniforge3/etc/profile.d/conda.sh"
  export PATH="$HOME/miniforge3/bin:$HOME/.local/bin:$PATH"
  export CONDA_EXE="$HOME/miniforge3/bin/conda"
  conda --version
  which conda uv

  cd snakemake/analysis/dELS_orthologs
  uv run --project ../../.. snakemake \
    --cores 32 \
    --use-conda \
    --resources mem_mb=220000 \
    --configfile config/config.yaml \
    --configfile config/config.cloud.yaml \
    --printshellcmds \
    --rerun-incomplete
