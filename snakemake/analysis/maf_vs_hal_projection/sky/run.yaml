name: maf-vs-hal-projection

# One-off benchmark: project 10k human BED windows onto 3 mammals via
# MAF stream and halLiftover, compare wall + recall + coordinate
# agreement. Issue #149 follow-up. ~6 h on first launch (HAL+MAF
# downloads dominate), ~3 h on reruns once S3 mirrors are warm.

resources:
    infra: aws/us-east-2
    instance_type: c6id.12xlarge      # 48 vCPU, 96 GB RAM, 2x1425 GB NVMe
    disk_size: 100                     # gp3 root vol
    labels:
        project: dna

workdir: .

setup: |
    set -euxo pipefail

    if [ ! -d "$HOME/miniforge3" ]; then
        curl -fsSL -o /tmp/miniforge.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
        bash /tmp/miniforge.sh -b -p "$HOME/miniforge3"
        rm /tmp/miniforge.sh
    fi
    if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
    fi
    grep -q 'miniforge3/bin' "$HOME/.bashrc" || \
        echo 'export PATH="$HOME/miniforge3/bin:$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"
    export PATH="$HOME/miniforge3/bin:$HOME/.local/bin:$PATH"

    # Cactus pre-built binaries — bundles halLiftover, hal2fasta, halStats.
    # No bioconda or conda-forge package exists; binaries are the upstream-
    # recommended path (see https://github.com/ComparativeGenomicsToolkit/cactus
    # BIN-INSTALL.md). We don't use Cactus's bundled python venv — only the
    # native binaries.
    CACTUS_VERSION=3.1.4
    CACTUS_DIR="$HOME/cactus-bin-v${CACTUS_VERSION}"
    if [ ! -d "$CACTUS_DIR" ]; then
        curl -fsSL -o /tmp/cactus.tar.gz \
            "https://github.com/ComparativeGenomicsToolkit/cactus/releases/download/v${CACTUS_VERSION}/cactus-bin-v${CACTUS_VERSION}.tar.gz"
        tar -xzf /tmp/cactus.tar.gz -C "$HOME"
        rm /tmp/cactus.tar.gz
    fi
    if ! grep -q 'cactus-bin' "$HOME/.bashrc"; then
        echo "export PATH=\"$CACTUS_DIR/bin:\$PATH\"" >> "$HOME/.bashrc"
        echo "export LD_LIBRARY_PATH=\"$CACTUS_DIR/lib:\${LD_LIBRARY_PATH:-}\"" >> "$HOME/.bashrc"
    fi

    uv sync

run: |
    set -euxo pipefail
    source "$HOME/miniforge3/etc/profile.d/conda.sh" 2>/dev/null || true
    # SkyPilot bundles its own aws CLI at /home/ubuntu/skypilot-runtime/bin
    # which is not on the default non-interactive PATH; if we don't add it
    # explicitly here, `aws s3 cp` later in this script silently exits 127
    # (and `aws s3 ls` in `if` tests false-negatives, taking the UCSC
    # download branch even when the file IS in S3).
    export PATH="$HOME/skypilot-runtime/bin:$HOME/miniforge3/bin:$HOME/.local/bin:$HOME/cactus-bin-v3.1.4/bin:$PATH"
    export LD_LIBRARY_PATH="$HOME/cactus-bin-v3.1.4/lib:${LD_LIBRARY_PATH:-}"
    command -v aws >/dev/null || (echo "aws not on PATH"; exit 1)

    # Verify Cactus binaries are reachable.
    command -v halLiftover >/dev/null || (echo "halLiftover not on PATH"; exit 1)
    command -v halStats >/dev/null || (echo "halStats not on PATH"; exit 1)

    # Mount instance-store NVMe if not already mounted. The SkyPilot AWS AMI
    # leaves c6id NVMes at /dev/nvme1n1, /dev/nvme2n1 (one per drive)
    # unmounted; root vol is gp3, only ~100 GB. Combine NVMes via mdadm
    # RAID0 → single ~2.6 TB volume at /mnt/nvme.
    if ! mountpoint -q /mnt/nvme; then
        sudo apt-get install -y mdadm
        # Find unmounted NVMe instance-store drives.
        # nvme0 is the root vol; nvme1+ are instance store.
        NVMES=$(lsblk -dn -o NAME,TYPE,MOUNTPOINT | awk '$2=="disk" && $3=="" && $1 ~ /^nvme[1-9]/ {print "/dev/"$1}')
        echo "Instance-store NVMes detected: $NVMES"
        N_NVME=$(echo "$NVMES" | wc -w)
        if [ "$N_NVME" -ge 2 ]; then
            sudo mdadm --create /dev/md0 --level=0 --raid-devices="$N_NVME" $NVMES --force --run
            DEV=/dev/md0
        elif [ "$N_NVME" -eq 1 ]; then
            DEV=$NVMES
        else
            echo "no instance-store NVMe found; falling back to root volume (likely too small)"
            DEV=""
        fi
        if [ -n "$DEV" ]; then
            sudo mkfs.ext4 -F -E nodiscard "$DEV"
            sudo mkdir -p /mnt/nvme
            sudo mount -o noatime "$DEV" /mnt/nvme
            sudo chown ubuntu:ubuntu /mnt/nvme
        fi
    fi

    # Pick working dir: prefer /mnt/nvme (we just mounted), then DLAMI
    # convention path, else /tmp (root vol; small).
    if mountpoint -q /mnt/nvme; then
        WORK=/mnt/nvme/maf-vs-hal
    elif [ -d /opt/dlami/nvme ]; then
        WORK=/opt/dlami/nvme/maf-vs-hal
    else
        WORK=/tmp/maf-vs-hal
    fi
    DATA="$WORK/data"
    OUT="$WORK/work"
    mkdir -p "$DATA" "$OUT"
    df -h "$WORK"

    HAL_NAME=447-mammalian-2022v1.hal
    MAF_NAME=447-mammalian-2022v1.fix2.single.maf.gz
    UCSC_BASE="https://cgl.gi.ucsc.edu/data/cactus"
    S3_STAGING="s3://oa-bolinas/staging"
    S3_RESULTS="s3://oa-bolinas/snakemake/analysis/maf_vs_hal_projection"
    # The upstream pipeline writes per-species subdirs (homo_sapiens/) even
    # though it's hg38-only — discovered the hard way in the first relaunch
    # (404 from `aws s3 cp` without the prefix). Per `aws s3 ls
    # s3://oa-bolinas/snakemake/zoonomia_projection_dataset/results/bed/`.
    S3_INPUT="s3://oa-bolinas/snakemake/zoonomia_projection_dataset/results/bed/homo_sapiens/min0.20.bed.gz"

    # ----- 1. Stage HAL (S3 mirror; fall back to UCSC + upload) -----
    if [ ! -f "$DATA/$HAL_NAME" ]; then
        if aws s3 ls "$S3_STAGING/$HAL_NAME" >/dev/null 2>&1; then
            echo "[hal] pulling from S3 mirror"
            aws s3 cp "$S3_STAGING/$HAL_NAME" "$DATA/$HAL_NAME"
        else
            echo "[hal] not in S3; pulling from UCSC and mirroring"
            curl -fL --retry 3 -o "$DATA/$HAL_NAME" "$UCSC_BASE/$HAL_NAME"
            aws s3 cp "$DATA/$HAL_NAME" "$S3_STAGING/$HAL_NAME"
            curl -fsSL "$UCSC_BASE/$HAL_NAME.md5" -o "$DATA/$HAL_NAME.md5"
            aws s3 cp "$DATA/$HAL_NAME.md5" "$S3_STAGING/$HAL_NAME.md5"
        fi
    fi
    ls -la "$DATA/$HAL_NAME"

    # ----- 2. Stage MAF + .tai index -----
    if [ ! -f "$DATA/$MAF_NAME" ]; then
        if aws s3 ls "$S3_STAGING/$MAF_NAME" >/dev/null 2>&1; then
            echo "[maf] pulling from S3 mirror"
            aws s3 cp "$S3_STAGING/$MAF_NAME" "$DATA/$MAF_NAME"
            aws s3 cp "$S3_STAGING/$MAF_NAME.tai" "$DATA/$MAF_NAME.tai" || true
        else
            echo "[maf] not in S3; pulling from UCSC and mirroring"
            curl -fL --retry 3 -o "$DATA/$MAF_NAME" "$UCSC_BASE/$MAF_NAME"
            curl -fL --retry 3 -o "$DATA/$MAF_NAME.tai" "$UCSC_BASE/$MAF_NAME.tai"
            aws s3 cp "$DATA/$MAF_NAME" "$S3_STAGING/$MAF_NAME"
            aws s3 cp "$DATA/$MAF_NAME.tai" "$S3_STAGING/$MAF_NAME.tai"
            curl -fsSL "$UCSC_BASE/$MAF_NAME.md5" -o "$DATA/$MAF_NAME.md5"
            aws s3 cp "$DATA/$MAF_NAME.md5" "$S3_STAGING/$MAF_NAME.md5"
        fi
    fi
    ls -la "$DATA/$MAF_NAME"

    # ----- 3. Stage benchmark input BED -----
    if [ ! -f "$DATA/min0.20.bed.gz" ]; then
        aws s3 cp "$S3_INPUT" "$DATA/min0.20.bed.gz"
    fi

    # ----- 4. Sample windows. Tier-style benchmark — start tiny so bugs
    # surface in seconds, not hours. N + MAX_START + TIER are env-driven so
    # `sky exec --env TIER=t1` (etc.) picks the level without editing YAML.
    # Defaults: TIER=t1, N=10, MAX_START=1_000_000 (chr1:0-1Mbp, ~30 sec).
    TIER="${TIER:-t1}"
    case "$TIER" in
        t1) N=${N:-10};      MAX_START=${MAX_START:-1000000} ;;     # chr1:0-1Mbp
        t2) N=${N:-100};     MAX_START=${MAX_START:-10000000} ;;    # chr1:0-10Mbp
        t3) N=${N:-10000};   MAX_START=${MAX_START:-} ;;            # full chr1
        *)  echo "unknown TIER=$TIER (use t1/t2/t3)"; exit 1 ;;
    esac
    echo "[tier $TIER] n=$N max_start=${MAX_START:-(none)}"

    SAMPLE_ARGS=( --input "$DATA/min0.20.bed.gz" --chrom 1
                  --n "$N" --seed 42 --output "$OUT/bench_windows.bed" )
    [ -n "$MAX_START" ] && SAMPLE_ARGS+=( --max-start "$MAX_START" )
    uv run python snakemake/analysis/maf_vs_hal_projection/scripts/sample_windows.py \
        "${SAMPLE_ARGS[@]}"

    SPECIES="Mus_musculus Bos_taurus Tenrec_ecaudatus"

    # Per-tier output subdirs so reruns don't clobber prior tiers' results.
    TIER_OUT="$OUT/$TIER"
    mkdir -p "$TIER_OUT"

    # ----- 5. MAF backend -----
    time uv run python snakemake/analysis/maf_vs_hal_projection/scripts/run_maf.py \
        --maf "$DATA/$MAF_NAME" \
        --windows "$OUT/bench_windows.bed" \
        --species $SPECIES \
        --anchor-chrom chr1 \
        --out-dir "$TIER_OUT/out_maf"

    # ----- 6. HAL backend -----
    time uv run python snakemake/analysis/maf_vs_hal_projection/scripts/run_hal.py \
        --hal "$DATA/$HAL_NAME" \
        --windows "$OUT/bench_windows.bed" \
        --species $SPECIES \
        --out-dir "$TIER_OUT/out_hal" \
        --work-dir "$TIER_OUT/hal_work"

    # ----- 7. Compare -----
    uv run python snakemake/analysis/maf_vs_hal_projection/scripts/compare.py \
        --maf-dir "$TIER_OUT/out_maf" \
        --hal-dir "$TIER_OUT/out_hal" \
        --species $SPECIES \
        --n-windows "$N" \
        --output "$TIER_OUT/comparison.md"

    # ----- 8. Push everything to S3 (tier-namespaced) -----
    aws s3 cp --recursive "$TIER_OUT/out_maf" "$S3_RESULTS/$TIER/out_maf/"
    aws s3 cp --recursive "$TIER_OUT/out_hal" "$S3_RESULTS/$TIER/out_hal/"
    aws s3 cp "$TIER_OUT/comparison.md" "$S3_RESULTS/$TIER/comparison.md"
    aws s3 cp "$OUT/bench_windows.bed" "$S3_RESULTS/$TIER/bench_windows.bed"

    echo "==== $TIER comparison.md ===="
    cat "$TIER_OUT/comparison.md"
