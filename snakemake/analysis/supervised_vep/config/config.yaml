# Supervised VEP follow-up to #175 (tracked in #180).
#
# Iter-0: cache mean-pooled embeddings + zero-shot scalars + TraitGym
# innerprod for exp166-p1B × {mendelian, complex_traits, eqtl} train splits.
# Train split only — test held out for the eventual final-eval pass.

input_hf_prefix: bolinas-dna/evals

genome_url: http://ftp.ensembl.org/pub/release-113/fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz

# Train-only convention (matches #161 / #162 / #172 leaderboards).
split: train

datasets:
  - name: mendelian_traits
  - name: complex_traits
  - name: eqtl

# Single model for this investigation — the 1B zoonomia generalist from #175.
# Model is loaded from HF Hub by id (no GCS download stage).
#
# `window_size: 255` = 255 bp DNA; the BOS token the tokenizer prepends makes
# 256 total tokens per context.
models:
  - name: exp166-p1B
    hf_repo: bolinas-dna/exp166-p1B-step-16398
    window_size: 255

inference:
  batch_size: 16          # 1B Qwen3 at 256 tokens fits ~16 on A10G (24 GB).
  num_workers: 4
  data_transform_on_the_fly: true
  torch_compile: false

# Iter-1 supervised-CV settings.
#
# `mode` controls the classifier hparam grids:
#   "bfs"     — minimal grid (one value per knob) for the first-pass sweep
#   "refine"  — wide grids; only invoke this after BFS identifies top cells
#
# Recipes apply to all 3 datasets when symmetric, mendelian-only when
# asymmetric (the pipeline filters automatically via
# `is_recipe_dataset_compatible`).
cv:
  n_splits: 3
  n_splits_inner: 3
  mode: bfs

recipes:
  # Symmetric (apply to all 3 datasets).
  - abs_delta
  - prod
  - sym_concat
  - traitgym_innerprod
  - abs_delta_plus_scalars
  # Asymmetric (mendelian_traits only).
  - mean_delta
  - mean_concat_plus_llr

classifiers:
  - logreg_l2
  - linearsvc
  - knn
  - xgboost
  - pairwise_logreg

# (recipe, classifier) cells to skip for specific datasets in the iter-1 BFS
# sweep. LinearSVC with the default solver converges very slowly on the
# bigger mendelian recipes (D=3840-5760, n_train≈6500); 1h+ wall-clock per
# combo isn't worth the BFS slot. Revisit in iter-1b with `dual=True` and/or
# a tighter `max_iter` if these cells turn out interesting from the other
# classifiers.
skip_combos:
  - {dataset: mendelian_traits, recipe: mean_concat_plus_llr, classifier: linearsvc}
  - {dataset: mendelian_traits, recipe: mean_delta, classifier: linearsvc}
  - {dataset: mendelian_traits, recipe: sym_concat, classifier: linearsvc}

# Iter-2 LoRA fine-tuning settings.
#
# Architecture: no head — score is `||flat(last_ref) − flat(last_alt)||₂`,
# LoRA adapters on q_proj/v_proj are the only learnable parameters. Symmetric
# by construction → same architecture for all 3 datasets.
#
# Conservative starting hparams for the phase-0 sanity (small rank,
# moderate dropout, few epochs) so overfitting is contained and visible
# from epoch 1 → 2.
lora:
  rank: 4
  alpha: 16
  dropout: 0.1
  target_modules: [q_proj, v_proj]
  epochs: 2
  lr: 1.0e-4
  batch_size: 8
  margin: 1.0

# Zero-shot baseline scores reported alongside the supervised OOF metrics so
# the leaderboard shows the "no-supervised-head" row for direct comparison.
baseline_scores:
  - minus_llr
  - abs_llr
  - embed_last_l2
