# SkyPilot task: iter-2 LoRA fine-tuning (#180).
#
# GPU node (A10G:1 sufficient for 1B model + LoRA at batch=8, window=256).
# Smaller-first dataset order: complex_traits → eqtl → mendelian.
#
# Launch (debug single fold of complex_traits — phase 0 sanity):
#   sky launch snakemake/analysis/supervised_vep/sky/run_lora.yaml -c supervised-vep-lora \
#     --env SNAKEMAKE_ARGS='results/lora_predictions/exp166-p1B/complex_traits/fold_0.parquet'
#
# Launch (complex_traits full 3-fold OOF + metrics):
#   sky exec supervised-vep-lora snakemake/analysis/supervised_vep/sky/run_lora.yaml \
#     --env SNAKEMAKE_ARGS='lora_complex_traits'
#
# Launch (all 3 datasets — iter-2 final):
#   sky exec supervised-vep-lora snakemake/analysis/supervised_vep/sky/run_lora.yaml \
#     --env SNAKEMAKE_ARGS='lora_all'

name: supervised-vep-lora

resources:
    infra: aws/us-east-2
    accelerators: A10G:1
    disk_size: 100
    labels:
        project: dna

workdir: .

envs:
    SNAKEMAKE_ARGS: ""

setup: |
    set -euxo pipefail

    if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
    fi

    grep -q '/.local/bin' "$HOME/.bashrc" || \
        echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"

    export PATH="$HOME/.local/bin:$PATH"

    uv sync --frozen

    # Pin torch + CUDA to the combo that exp166-p1B was tested with in iter-0.
    uv pip install --reinstall --no-deps torch==2.5.1+cu121 \
        --index-url https://download.pytorch.org/whl/cu121
    uv pip install --no-deps \
        nvidia-nccl-cu12==2.21.5 nvidia-cublas-cu12==12.1.3.1 \
        nvidia-cudnn-cu12==9.1.0.70

    .venv/bin/python -c 'import torch; assert torch.cuda.is_available()'

run: |
    set -euxo pipefail

    export PATH="$HOME/.local/bin:$PATH"
    export WANDB_DISABLED=true

    cd snakemake/analysis/supervised_vep

    # Default target if SNAKEMAKE_ARGS is empty: complex_traits sanity.
    args="${SNAKEMAKE_ARGS:-lora_complex_traits}"

    uv run --project ../../.. snakemake \
        --profile workflow/profiles/default \
        --printshellcmds \
        --rerun-incomplete \
        --keep-going \
        $args
