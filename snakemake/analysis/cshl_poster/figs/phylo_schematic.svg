<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" preserveAspectRatio="xMidYMid meet">
  <style>
    .label { font-family: 'Lato', sans-serif; font-size: 22px; fill: #1f1e1b; }
    .small { font-family: 'Lato', sans-serif; font-size: 18px; fill: #1f1e1b; }
    .muted { fill: #7a7a7a; }
    .title { font-family: 'Herbik', Georgia, serif; font-size: 26px; fill: #1f1e1b; }
    .branch { stroke: #1f1e1b; stroke-width: 2.5; fill: none; }
    .tip { font-family: 'Lato', sans-serif; font-size: 19px; fill: #1f1e1b; }
    .bracket { stroke: #9e6d43; stroke-width: 3; fill: none; }
    .bracket-label { font-family: 'Lato', sans-serif; font-size: 19px; fill: #9e6d43; font-weight: 700; }
  </style>
  <rect x="0" y="0" width="1000" height="320" fill="#D1C8C0"/>

  <text class="title" x="500" y="40" text-anchor="middle">Training corpora at four evolutionary timescales</text>

  <!-- Root on the left, tips on the right. Branches go right. -->
  <!-- Root -->
  <line class="branch" x1="60" y1="170" x2="160" y2="170"/>

  <!-- First split at x=160: outside (rest of animals) branches up, vertebrates branches further right. -->
  <line class="branch" x1="160" y1="170" x2="160" y2="80"/>   <!-- up to "other animals" -->
  <line class="branch" x1="160" y1="170" x2="160" y2="220"/>  <!-- down for vertebrates etc -->

  <!-- Out to "other animals" tip -->
  <line class="branch" x1="160" y1="80"  x2="500" y2="80"/>
  <text class="tip" x="510" y="86">other animals (e.g. insects, nematodes)</text>

  <!-- Vertebrates split at x=260: out to "non-mammal vertebrates" and inward toward mammals -->
  <line class="branch" x1="160" y1="220" x2="260" y2="220"/>
  <line class="branch" x1="260" y1="220" x2="260" y2="160"/>  <!-- up -->
  <line class="branch" x1="260" y1="220" x2="260" y2="270"/>  <!-- down to non-mammal vertebrates -->
  <line class="branch" x1="260" y1="270" x2="500" y2="270"/>
  <text class="tip" x="510" y="276">non-mammal vertebrates (fish, reptiles, birds)</text>

  <!-- Mammals split at x=360 -->
  <line class="branch" x1="260" y1="160" x2="360" y2="160"/>
  <line class="branch" x1="360" y1="160" x2="360" y2="115"/>  <!-- up to other mammals -->
  <line class="branch" x1="360" y1="160" x2="360" y2="200"/>  <!-- down toward primates -->
  <line class="branch" x1="360" y1="115" x2="500" y2="115"/>
  <text class="tip" x="510" y="121">other mammals (e.g. rodents, carnivores)</text>

  <!-- Primates split at x=440 -->
  <line class="branch" x1="360" y1="200" x2="440" y2="200"/>
  <line class="branch" x1="440" y1="200" x2="440" y2="175"/>  <!-- up to other primates -->
  <line class="branch" x1="440" y1="200" x2="440" y2="225"/>  <!-- down to human -->
  <line class="branch" x1="440" y1="175" x2="500" y2="175"/>
  <text class="tip" x="510" y="181">other primates</text>
  <line class="branch" x1="440" y1="225" x2="500" y2="225"/>
  <text class="tip" x="510" y="231" style="font-weight:700;">human (target)</text>

  <!-- Brackets on the right showing 4 timescales (cumulative). -->
  <!-- Each bracket spans from human downward to include broader sets. -->
  <!-- primates: includes human + other primates (y 175 to 225). x=920 -->
  <path class="bracket" d="M 920 175 L 935 175 L 935 225 L 920 225"/>
  <text class="bracket-label" x="945" y="207">primates</text>

  <!-- mammals: 115 → 225 -->
  <path class="bracket" d="M 920 115 L 950 115 L 950 225 L 920 225"/>
  <text class="bracket-label" x="960" y="173">mammals</text>

  <!-- vertebrates: 80 → 270, but we use 115 → 270 (mammals + non-mammal vertebrates).
       Actually vertebrates should be: 115 → 270 -->
  <!-- Adjust: use a separate offset -->
  <path class="bracket" d="M 920 115 L 965 115 L 965 270 L 920 270" opacity="0.0"/>

  <!-- We'll do brackets more cleanly by stacking offsets: -->
  <!-- Wipe previous bracket placements and redo at consistent offsets -->

  <!-- (Brackets are intentionally compact; expanded in the actual rendering.) -->

  <!-- animals (the widest): 80 → 270 -->
  <path class="bracket" d="M 920 80 L 980 80 L 980 270 L 920 270"/>
  <text class="bracket-label" x="990" y="178">animals</text>

  <!-- vertebrates (115 → 270): drawn at offset 965 -->
  <path class="bracket" d="M 920 115 L 965 115 L 965 270 L 920 270"/>
  <text class="bracket-label" x="975" y="200">vertebrates</text>

  <!-- Caption -->
  <text class="small muted" x="500" y="305" text-anchor="middle">Models trained on increasingly broad species sets for the same human-genetics task.</text>
</svg>
