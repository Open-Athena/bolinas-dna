<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet">
  <style>
    .axis { stroke: #1f1e1b; stroke-width: 2; fill: none; }
    .tick { stroke: #1f1e1b; stroke-width: 1.5; }
    .label { font-family: 'Lato', sans-serif; font-size: 22px; fill: #1f1e1b; }
    .small { font-family: 'Lato', sans-serif; font-size: 18px; fill: #1f1e1b; }
    .muted { fill: #7a7a7a; }
    .line { stroke: #9e6d43; stroke-width: 4; fill: none; }
    .marker { fill: #9e6d43; }
    .placeholder { font-family: 'Herbik', Georgia, serif; font-size: 28px; fill: #7a7a7a; font-style: italic; }
  </style>
  <rect x="0" y="0" width="800" height="500" fill="#D1C8C0"/>

  <line class="axis" x1="120" y1="60" x2="120" y2="420"/>
  <line class="axis" x1="120" y1="420" x2="760" y2="420"/>

  <g>
    <line class="tick" x1="115" y1="420" x2="120" y2="420"/>
    <text class="small" x="105" y="426" text-anchor="end">0.40</text>
    <line class="tick" x1="115" y1="330" x2="120" y2="330"/>
    <text class="small" x="105" y="336" text-anchor="end">0.50</text>
    <line class="tick" x1="115" y1="240" x2="120" y2="240"/>
    <text class="small" x="105" y="246" text-anchor="end">0.60</text>
    <line class="tick" x1="115" y1="150" x2="120" y2="150"/>
    <text class="small" x="105" y="156" text-anchor="end">0.70</text>
    <line class="tick" x1="115" y1="60"  x2="120" y2="60"/>
    <text class="small" x="105" y="66"  text-anchor="end">0.80</text>
  </g>

  <g>
    <line class="tick" x1="220" y1="420" x2="220" y2="425"/>
    <text class="small" x="220" y="450" text-anchor="middle">primates</text>
    <line class="tick" x1="380" y1="420" x2="380" y2="425"/>
    <text class="small" x="380" y="450" text-anchor="middle">mammals</text>
    <line class="tick" x1="540" y1="420" x2="540" y2="425"/>
    <text class="small" x="540" y="450" text-anchor="middle">vertebrates</text>
    <line class="tick" x1="700" y1="420" x2="700" y2="425"/>
    <text class="small" x="700" y="450" text-anchor="middle">animals</text>
  </g>
  <text class="small muted" x="440" y="478" text-anchor="middle">narrower ← timescale → broader</text>

  <!-- Curve: rising to animals.
       primates: 0.55 → y = 420 - 0.15/0.40*360 = 420 - 135 = 285
       mammals:  0.65 → 420 - 0.25/0.40*360 = 420 - 225 = 195
       vertebrates: 0.72 → 420 - 0.32/0.40*360 = 420 - 288 = 132
       animals:  0.76 → 420 - 0.36/0.40*360 = 420 - 324 = 96  -->
  <path class="line" d="M 220 285 Q 300 240 380 195 Q 460 165 540 132 Q 620 110 700 96"/>
  <circle class="marker" cx="220" cy="285" r="8"/>
  <circle class="marker" cx="380" cy="195" r="8"/>
  <circle class="marker" cx="540" cy="132" r="8"/>
  <circle class="marker" cx="700" cy="96"  r="8"/>

  <text class="label" x="700" y="78" text-anchor="middle" style="font-weight:700; fill:#9e6d43;">★ optimum</text>

  <text class="label" x="60" y="240" text-anchor="middle" transform="rotate(-90 60 240)">CDS AUPRC</text>

  <text class="placeholder" x="780" y="490" text-anchor="end">placeholder</text>
</svg>
