<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" preserveAspectRatio="xMidYMid meet">
  <style>
    .label { font-family: 'Lato', sans-serif; font-size: 22px; fill: #1f1e1b; }
    .small { font-family: 'Lato', sans-serif; font-size: 18px; fill: #1f1e1b; }
    .muted { fill: #7a7a7a; }
    .title { font-family: 'Herbik', Georgia, serif; font-size: 26px; fill: #1f1e1b; }
    .conn  { stroke: #1f1e1b; stroke-width: 1.5; fill: none; }
  </style>
  <rect x="0" y="0" width="1000" height="320" fill="#D1C8C0"/>

  <!-- Title -->
  <text class="title" x="500" y="40" text-anchor="middle">Genomic regions used for region-specific training</text>

  <!-- Chromosome backbone -->
  <rect x="60" y="150" width="880" height="50" rx="25" ry="25" fill="#A99B8D" stroke="#1f1e1b" stroke-width="2"/>

  <!-- Centromere (mid pinch) -->
  <circle cx="500" cy="175" r="14" fill="#1f1e1b"/>

  <!-- Region segments along chromosome.
       Each region drawn as a colored band on top of backbone with a label below.
       Coordinates: x_start, width on the 880-wide track. -->

  <!-- 5'UTR -->
  <rect x="120" y="150" width="60" height="50" fill="#6b5b3e" stroke="#1f1e1b" stroke-width="1.5"/>
  <line class="conn" x1="150" y1="200" x2="150" y2="240"/>
  <text class="small" x="150" y="265" text-anchor="middle">5′UTR</text>

  <!-- Promoter -->
  <rect x="200" y="150" width="80" height="50" fill="#9e6d43" stroke="#1f1e1b" stroke-width="1.5"/>
  <line class="conn" x1="240" y1="200" x2="240" y2="240"/>
  <text class="small" x="240" y="265" text-anchor="middle" style="font-weight:700; fill:#9e6d43;">promoter</text>
  <text class="small muted" x="240" y="288" text-anchor="middle">(R1, T1)</text>

  <!-- CDS exon 1 -->
  <rect x="320" y="150" width="120" height="50" fill="#7a3b2e" stroke="#1f1e1b" stroke-width="1.5"/>
  <text class="small" x="380" y="183" text-anchor="middle" fill="#f5efe6" style="font-weight:700;">CDS</text>

  <!-- CDS exon 2 -->
  <rect x="560" y="150" width="100" height="50" fill="#7a3b2e" stroke="#1f1e1b" stroke-width="1.5"/>
  <text class="small" x="610" y="183" text-anchor="middle" fill="#f5efe6" style="font-weight:700;">CDS</text>

  <line class="conn" x1="500" y1="200" x2="500" y2="240"/>
  <text class="small" x="500" y="265" text-anchor="middle" style="font-weight:700; fill:#7a3b2e;">CDS</text>
  <text class="small muted" x="500" y="288" text-anchor="middle">(T2)</text>

  <!-- 3'UTR -->
  <rect x="680" y="150" width="60" height="50" fill="#6b5b3e" stroke="#1f1e1b" stroke-width="1.5"/>
  <line class="conn" x1="710" y1="200" x2="710" y2="240"/>
  <text class="small" x="710" y="265" text-anchor="middle">3′UTR</text>

  <!-- ncRNA -->
  <rect x="780" y="150" width="100" height="50" fill="#4a5d8a" stroke="#1f1e1b" stroke-width="1.5"/>
  <line class="conn" x1="830" y1="200" x2="830" y2="240"/>
  <text class="small" x="830" y="265" text-anchor="middle">ncRNA</text>

  <!-- 5' / 3' end markers -->
  <text class="small muted" x="60"  y="140" text-anchor="start">5′</text>
  <text class="small muted" x="940" y="140" text-anchor="end">3′</text>

  <!-- Caption note -->
  <text class="small muted" x="500" y="115" text-anchor="middle">Region-specific models are trained on the highlighted subset only.</text>
</svg>
