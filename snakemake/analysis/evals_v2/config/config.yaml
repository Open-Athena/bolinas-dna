# HuggingFace prefix for the matched-pair eval datasets. Each dataset is
# loaded as f"{input_hf_prefix}_{dataset.name}".
input_hf_prefix: bolinas-dna/evals

# Canonical bgzipped + indexed GRCh38 (Ensembl release 115; sequence is
# byte-identical to 113/114 — only annotations differ). Read directly from
# S3 by pyfaidx via fsspec/s3fs — no full download.
genome_path: s3://oa-bolinas/data/genomes/homo_sapiens/GRCh38/ensembl-release-115/Homo_sapiens.GRCh38.dna_sm.primary_assembly.fa.gz

# Train-only convention — the test split is held out for the final-eval pass.
# All development / iteration uses train.
split: train

datasets:
  - name: mendelian_traits
    score_column: minus_llr   # pathogenic positives should score higher than gnomAD-common negatives
  - name: complex_traits
    score_column: abs_llr     # fine-mapped positives — magnitude regardless of direction
  - name: eqtl
    score_column: abs_llr     # GTEx fine-mapped eQTLs — magnitude regardless of direction

# Model checkpoints. Each entry must have exactly one of:
#   - `gcs_path`: full GCS URI to the checkpoint directory (includes /hf/step-{N});
#                  pulled with `gcloud storage cp -r`.
#   - `hf_repo`:  HuggingFace Hub repo ID; pulled with `huggingface_hub.snapshot_download`.
# The result lands in results/checkpoints/{name}/.
#
# `window_size` is the number of DNA bases extracted per variant context.
# 256 = old convention (no BOS, e.g. exp55/58/59).
# 255 = new convention (BOS prepended, e.g. exp136 / exp166-p1B).
models:
  - name: exp55-mammals
    gcs_path: gs://marin-dna-us-central1/checkpoints/exp55-mammals-r01-52f413/hf/step-16999
    window_size: 256

  - name: exp58-mammals
    gcs_path: gs://marin-dna-us-central1/checkpoints/exp58-mammals-r01-23d451/hf/step-16999
    window_size: 256

  - name: exp58-animals
    gcs_path: gs://marin-dna-us-central1/checkpoints/exp58-animals-r01-1e3682/hf/step-16999
    window_size: 256

  - name: exp59-mammals
    gcs_path: gs://marin-dna-us-central1/checkpoints/exp59-mammals-r01-1d9235/hf/step-16999
    window_size: 256

  - name: exp136-proj_v30
    gcs_path: gs://marin-us-central1/checkpoints/dna-bolinas-enhancer-curation-v0.1-proj_v30-6692f0/hf/step-9999
    window_size: 255   # 255 bp DNA + BOS = 256 total tokens

  - name: exp166-p1B
    hf_repo: bolinas-dna/exp166-p1B-step-16398   # 1B zoonomia-v1-v1 generalist
    window_size: 255

inference:
  batch_size: 64        # OOMs at 512 on A10G (24 GB) for 0.6B Qwen3 + 256 tokens
  num_workers: 4
  data_transform_on_the_fly: true
  torch_compile: false
  rc_avg: true          # FWD + RC averaging; doubles inference time but is the
                        # validated default per issue #175 conclusion 2.
