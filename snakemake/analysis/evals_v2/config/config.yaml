inference:
  batch_size: 128       # Was 64 with output_hidden_states=True keeping all
                        # 19+2 layers' activations alive (~2.6 GB at L=256,
                        # hidden=1920); the slim LLR+JSD bundle frees that
                        # headroom for ~2x batch on A10G (24 GB).
  num_workers: 4
  data_transform_on_the_fly: true
  torch_compile: true
  rc_avg: true          # FWD + RC averaging; doubles inference time but is the
                        # validated default per issue #175 conclusion 2.
