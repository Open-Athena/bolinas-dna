# Thresholds from: Sullivan, Patrick F., et al. "Leveraging base-pair mammalian
# constraint to understand genetic variation and human disease."
# Science 380.6643 (2023): eabn2937.
conservation:
    homo_sapiens:
        phyloP_241m:
            url: "https://hgdownload.soe.ucsc.edu/goldenPath/hg38/cactus241way/cactus241way.phyloP.bw"
            threshold: 2.27
        # Filename says phyloP but this is the 43-primate phastCons track
        # from the Zoonomia/Cactus hub (threshold 0.961 is in phastCons 0–1 range)
        phastCons_43p:
            url: "https://cgl.gi.ucsc.edu/data/cactus/zoonomia-2021-track-hub/hg38/phyloPPrimates.bigWig"
            threshold: 0.961
    mus_musculus:
        # Euarchontoglires phastCons from UCSC mm10 60-way multiz alignment
        # (20 species: rodents + primates + treeshrew).
        # Threshold calibrated so genome-wide conserved fraction (~3.46%)
        # matches human phastCons_43p at 0.961 (~3.48%).
        phastCons_euarchontoglires:
            url: "https://hgdownload.soe.ucsc.edu/goldenPath/mm10/phastCons60way/mm10.60way.phastCons60wayEuarchontoGlire.bw"
            threshold: 0.986

max_samples:
    validation: 16384
    test: 16384

alphagenome_weights:
    repo: "gtca/alphagenome_pytorch"
    filename: "model_all_folds.safetensors"

models:
    default:
        freeze_backbone: true
        learning_rate: 1e-4
        weight_decay: 0.1
        gradient_clip_val: 1.0
        batch_size: 256
        warmup_fraction: 0.1
    finetune:
        freeze_backbone: false
    random_init:
        freeze_backbone: false
        random_init: true
    finetune_mlp:
        freeze_backbone: false
        mlp_hidden_dim: 256

experiments:
    - { model: finetune, dataset: v8a }
    - { model: finetune, dataset: v8b }

# Per-bin enhancer segmentation (issue #115). Shares the conservation /
# exon-filtered enhancer definition with the classification pipeline; the
# only difference is the model formulation. Window size is parameterized
# per-dataset; num_bins is always window_size / bin_size.
segmentation:
    bin_size: 128
    bin_overlap_threshold: 0.5
    background_fraction_max: 0.1

seg_datasets:
    seg_v1:
        window_size: 16384
        split: v4b
        intervals:
            homo_sapiens: noexon/conserved/phastCons_43p/20/ELS
            mus_musculus: noexon/conserved/phastCons_euarchontoglires/20/ELS
    # Context-size experiment: 8192 bp windows (64 bins). Same intervals as
    # seg_v1, same v4b split. Training uses batch_size=64 (2x) to hold total
    # nucleotides per batch constant at 524,288; max_steps caps total nt seen
    # to match the 16k variant for a compute-fair comparison.
    seg_v1_8k:
        window_size: 8192
        split: v4b
        intervals:
            homo_sapiens: noexon/conserved/phastCons_43p/20/ELS
            mus_musculus: noexon/conserved/phastCons_euarchontoglires/20/ELS
    # 32768 bp windows (256 bins). batch_size=16 keeps total nucleotides
    # per batch constant; max_steps=811 matches 16k compute.
    seg_v1_32k:
        window_size: 32768
        split: v4b
        intervals:
            homo_sapiens: noexon/conserved/phastCons_43p/20/ELS
            mus_musculus: noexon/conserved/phastCons_euarchontoglires/20/ELS
    # 65536 bp windows (512 bins). batch_size=8 keeps nucleotides/batch const.
    seg_v1_64k:
        window_size: 65536
        split: v4b
        intervals:
            homo_sapiens: noexon/conserved/phastCons_43p/20/ELS
            mus_musculus: noexon/conserved/phastCons_euarchontoglires/20/ELS
    # 131072 bp windows (1024 bins). batch_size=4 keeps nt/batch const.
    seg_v1_128k:
        window_size: 131072
        split: v4b
        intervals:
            homo_sapiens: noexon/conserved/phastCons_43p/20/ELS
            mus_musculus: noexon/conserved/phastCons_euarchontoglires/20/ELS

    # Positive-set-definition sweep (sub-issue of #96). Same 64k window, same
    # v4b split, same xfmr2_w64k_s42 model as `seg_v1_64k` baseline — only the
    # intervals differ. AU-PRC is NOT comparable across these definitions
    # (base rates differ); use per-bin val AU-PRC only as within-definition
    # difficulty, and compare runs qualitatively via bedgraphs and top-10
    # misclassified regions.
    seg_pos_all_64k:
        window_size: 65536
        split: v4b
        intervals:
            homo_sapiens: noexon/conserved/phastCons_43p/20/ALL
            mus_musculus: noexon/conserved/phastCons_euarchontoglires/20/ALL
    seg_pos_cons30_64k:
        window_size: 65536
        split: v4b
        intervals:
            homo_sapiens: noexon/conserved/phastCons_43p/30/ELS
            mus_musculus: noexon/conserved/phastCons_euarchontoglires/30/ELS
    seg_pos_cons50_64k:
        window_size: 65536
        split: v4b
        intervals:
            homo_sapiens: noexon/conserved/phastCons_43p/50/ELS
            mus_musculus: noexon/conserved/phastCons_euarchontoglires/50/ELS
    seg_pos_withexon_64k:
        window_size: 65536
        split: v4b
        intervals:
            homo_sapiens: conserved/phastCons_43p/20/ELS
            mus_musculus: conserved/phastCons_euarchontoglires/20/ELS

seg_models:
    default:
        freeze_backbone: false
        learning_rate: 1e-4
        weight_decay: 0.1
        gradient_clip_val: 1.0
        # Batch 32 x 128 bins x ~3.7% pos rate ~= 118 positive bins/batch,
        # comparable to the classifier's ~128 positive windows per 256 x 0.5
        # balanced batch. Bump to 64 if L4 memory permits.
        batch_size: 32
        warmup_fraction: 0.1
        # pos_weight is computed inside train.py from the training parquet.
        # Lightning throughput caps — null / 1.0 means "no cap".
        max_steps: -1
        limit_train_batches: 1.0
        limit_val_batches: 1.0
    # Fast smoke-test variant: trains on 10% of batches, validates on 10% of
    # the val set. Reuses the full seg_v1 parquet so no data rebuild.
    fast:
        limit_train_batches: 0.1
        limit_val_batches: 0.1
    # Experiment: one AlphaGenome transformer block stacked on the CNN trunk.
    # Species embedding is a single learnable 1536-vector initialized from the
    # pretrained human row (see issue #115 discussion). Fast-run slice to
    # make a first comparison against the CNN-only baseline.
    transformer_one_layer:
        limit_train_batches: 0.1
        limit_val_batches: 0.1
        n_transformer_layers: 1
    transformer_two_layers:
        limit_train_batches: 0.1
        limit_val_batches: 0.1
        n_transformer_layers: 2
    # Phase 1: LR sweep on transformer_two_layers at seed=42.
    # Existing `transformer_two_layers` covers lr=1e-4/seed=42 (the defaults).
    xfmr2_lr5e5_s42:
        limit_train_batches: 0.1
        limit_val_batches: 0.1
        n_transformer_layers: 2
        learning_rate: 5e-5
        seed: 42
    xfmr2_lr2e4_s42:
        limit_train_batches: 0.1
        limit_val_batches: 0.1
        n_transformer_layers: 2
        learning_rate: 2e-4
        seed: 42
    xfmr2_lr5e4_s42:
        limit_train_batches: 0.1
        limit_val_batches: 0.1
        n_transformer_layers: 2
        learning_rate: 5e-4
        seed: 42
    # Phase 2: second seed at the default lr=1e-4 to measure seed variance
    # and enable a 2-seed ensemble by averaging logits offline.
    xfmr2_lr1e4_s123:
        limit_train_batches: 0.1
        limit_val_batches: 0.1
        n_transformer_layers: 2
        learning_rate: 1e-4
        seed: 123
    xfmr2_lr1e4_s456:
        limit_train_batches: 0.1
        limit_val_batches: 0.1
        n_transformer_layers: 2
        learning_rate: 1e-4
        seed: 456
    # Context-size experiment at 8k: batch doubles to 64 to hold total
    # nucleotides/batch constant (64*8192 = 524,288, same as 32*16384).
    # max_steps=811 matches the 16k variant's step count (limit_train_batches=0.1
    # of the 16k loader), giving identical total nt seen = 425M.
    xfmr2_w8k_s42:
        n_transformer_layers: 2
        learning_rate: 1e-4
        seed: 42
        batch_size: 64
        max_steps: 811
        limit_train_batches: 1.0   # step cap above is the actual bound
        # Match prior 10% slice used by transformer_two_layers so val subset
        # sizes are comparable (~10% of the respective subsampled val).
        limit_val_batches: 0.1
    xfmr2_w32k_s42:
        n_transformer_layers: 2
        learning_rate: 1e-4
        seed: 42
        batch_size: 16
        max_steps: 811
        limit_train_batches: 1.0
        limit_val_batches: 0.1
    xfmr2_w64k_s42:
        n_transformer_layers: 2
        learning_rate: 1e-4
        seed: 42
        batch_size: 8
        max_steps: 811
        limit_train_batches: 1.0
        limit_val_batches: 0.1
    # Final full-epoch training at the best architecture (64k, 2 layers,
    # seed=42). No limit_*_batches cap, no max_steps cap — one full epoch over
    # the entire training data, full validation each epoch end.
    xfmr2_w64k_s42_full:
        n_transformer_layers: 2
        learning_rate: 1e-4
        seed: 42
        batch_size: 8
        max_steps: -1
        limit_train_batches: 1.0
        limit_val_batches: 1.0
    xfmr2_w128k_s42:
        n_transformer_layers: 2
        learning_rate: 1e-4
        seed: 42
        batch_size: 4
        max_steps: 811
        limit_train_batches: 1.0
        limit_val_batches: 0.1

seg_experiments:
    - { model: fast, dataset: seg_v1 }
    - { model: transformer_one_layer, dataset: seg_v1 }
    - { model: transformer_two_layers, dataset: seg_v1 }
    # Positive-set-definition sweep (sub-issue of #96).
    - { model: xfmr2_w64k_s42, dataset: seg_v1_64k }
    - { model: xfmr2_w64k_s42, dataset: seg_pos_all_64k }
    - { model: xfmr2_w64k_s42, dataset: seg_pos_cons30_64k }
    - { model: xfmr2_w64k_s42, dataset: seg_pos_cons50_64k }
    - { model: xfmr2_w64k_s42, dataset: seg_pos_withexon_64k }

seg_max_samples:
    validation: 8192

# Bedgraph tracks for segmentation. Each region's length must be a multiple
# of segmentation.window_size (16384 bp) — precompute by enlarging the
# biological interval symmetrically. The pipeline tiles the region with
# non-overlapping 16384 bp windows and emits one score per 128 bp bin.
# Original biological coords are kept as comments for provenance.
segmentation_visualization:
    checkpoints:
        - { model: fast, dataset: seg_v1 }
        - { model: transformer_one_layer, dataset: seg_v1 }
        - { model: transformer_two_layers, dataset: seg_v1 }
        # Positive-set-definition sweep (sub-issue of #96).
        - { model: xfmr2_w64k_s42, dataset: seg_v1_64k }
        - { model: xfmr2_w64k_s42, dataset: seg_pos_all_64k }
        - { model: xfmr2_w64k_s42, dataset: seg_pos_cons30_64k }
        - { model: xfmr2_w64k_s42, dataset: seg_pos_cons50_64k }
        - { model: xfmr2_w64k_s42, dataset: seg_pos_withexon_64k }
    regions:
        # ZRS_human: biological [156790115, 156793672), enlarged to 1 tile.
        - genome: homo_sapiens
          chrom: "7"
          start: 156783702
          end: 156800086
