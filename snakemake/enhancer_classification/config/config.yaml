window_size: 255
seed: 42

# Width (bp) of the center region used to score conservation.
# Set to the minimum ENCODE cCRE length (150 bp) so the window always
# falls within the annotated element, measuring core enhancer conservation
# rather than flanking sequence.
conservation_window: 150

cre_urls:
    homo_sapiens: "https://downloads.wenglab.org/Registry-V4/GRCh38-cCREs.bed"
    mus_musculus: "https://downloads.wenglab.org/Registry-V4/mm10-cCREs.bed"

# Group aliases used as the `{cre_class}` wildcard in `filter_cre_class` and
# downstream rules. `ELS` reproduces the original enhancer-only positive set;
# `ALL` is every class in the ENCODE SCREEN v4 registry (verified by
# inspecting results/cre/{species}/all.parquet).
cre_class_groups:
    ELS: [dELS, pELS]
    ALL: [PLS, pELS, dELS, CA, CA-CTCF, CA-H3K4me3, CA-TF, TF]

