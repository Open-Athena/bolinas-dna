        split: v1
        intervals: ELS
    v2:
        split: v2
        intervals: ELS
    v3:
        split: v2
        intervals: ELS_conserved_20

conservation:
    homo_sapiens:
        url: "https://hgdownload.soe.ucsc.edu/goldenPath/hg38/cactus241way/cactus241way.phyloP.bw"
        threshold: 2.27

max_samples:
    validation: 16384
    test: 16384

alphagenome_weights:
    repo: "gtca/alphagenome_pytorch"
    filename: "model_all_folds.safetensors"

models:
    default:
        freeze_backbone: true
        learning_rate: 1e-4
        weight_decay: 0.1
        gradient_clip_val: 1.0
        batch_size: 256
        warmup_fraction: 0.1
    finetune:
        freeze_backbone: false
    random_init:
        freeze_backbone: false
        random_init: true
    finetune_mlp:
        freeze_backbone: false
        mlp_hidden_dim: 256

experiments:
    - { model: finetune_mlp, dataset: v3 }

visualization:
    window_size: 255
    step_size: 32
    checkpoints:
        - { model: finetune_mlp, dataset: v3 }
    regions:
        - genome: homo_sapiens
          chrom: "7"
          start: 156790115
          end: 156793672
          name: ZRS_human
        - genome: gallus_gallus
          chrom: "2"
          start: 8549842
          end: 8556506
          name: ZRS_chicken
        - genome: mus_musculus
          chrom: "5"
          start: 29312497
          end: 29318634
          name: ZRS_mouse
        - genome: drosophila_melanogaster
          chrom: "2R"
          start: 9974394
          end: 9981777
          name: MSE_drosophila
