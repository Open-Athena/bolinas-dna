name: zoonomia-projection-hf-upload

# HF dataset assembly + upload (rule all_hf).

resources:
    infra: aws/us-east-2
    instance_type: r6i.8xlarge
    disk_size: 300
    labels:
        project: dna

workdir: .

# HF CLI reads the token from ~/.cache/huggingface/token.
file_mounts:
    ~/.cache/huggingface: ~/.cache/huggingface

setup: |
    set -euxo pipefail

    if [ ! -d "$HOME/miniforge3" ]; then
        curl -fsSL -o /tmp/miniforge.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
        bash /tmp/miniforge.sh -b -p "$HOME/miniforge3"
        rm /tmp/miniforge.sh
    fi

    if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
    fi

    grep -q 'miniforge3/bin' "$HOME/.bashrc" || \
        echo 'export PATH="$HOME/miniforge3/bin:$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"

    export PATH="$HOME/.local/bin:$PATH"
    uv sync

run: |
    set -euxo pipefail

    source "$HOME/miniforge3/etc/profile.d/conda.sh"
    export PATH="$HOME/miniforge3/bin:$HOME/.local/bin:$PATH"
    export CONDA_EXE="$HOME/miniforge3/bin/conda"

    cd snakemake/zoonomia_projection_dataset

    # Targets: each intervals_version listed in config.yaml gets its own
    # upload.done marker. Explicit per-version targets (rather than `all_hf`)
    # let `--rerun-triggers mtime` walk back only as far as each target's
    # actual missing inputs — Snakemake stops at the first existing upstream
    # file (e.g. `all_species_with_sequence.parquet` in S3), preventing a
    # spurious re-walk of `hal_to_fasta` / `project_one_species` /
    # `extract_sequences` / `merge_sequences` whose intermediate `local()`
    # FASTAs aren't mirrored to S3.
    TARGETS=$(uv run python -c "
    import yaml
    cfg = yaml.safe_load(open('config/config.yaml'))
    for iv in cfg['intervals_versions']:
        print(f'results/upload.done/zoonomia-{cfg[\"pipeline_version\"]}-{iv}')
    ")

    # Dry-run gate first — verify only HF-related rules are scheduled.
    uv run snakemake --profile workflow/profiles/default \
        --rerun-triggers mtime \
        --printshellcmds \
        -n $TARGETS

    # Real run.
    uv run snakemake --profile workflow/profiles/default \
        --rerun-triggers mtime \
        --printshellcmds \
        --rerun-incomplete \
        $TARGETS
