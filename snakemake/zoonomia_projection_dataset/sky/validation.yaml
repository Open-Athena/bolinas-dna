name: zoonomia-validation

# Per-recipe HF validation datasets (rule all_validation).
#
# Builds 6 human-only validation parquets (val_cds, val_utr5, val_utr3,
# val_ncrna, val_promoter, val_enhancer): tile recipe regions into 255 bp
# windows, score against phyloP_447m, conservation-pre-filter, deterministic
# subsample, twoBitToFa + per-base case-encode, push each to its own HF
# repo with a generated dataset card (commit-pinned permalink).
#
# c6id.2xlarge for the same reason as sky/run.yaml: phyloP_447m bigWig is
# ~10 GB and pyBigWig's per-window scoring benefits from local NVMe (gp3
# EBS is ~10x slower per the README). The HF mount mirrors sky/upload.yaml
# so per-recipe `hf upload` works without re-auth.
#
# Cluster pattern (memo cloud_launch_conventions + sky_cluster_reuse):
#   sky launch -c zoonomia-validation sky/validation.yaml
#   sky exec   zoonomia-validation   sky/validation.yaml   # subsequent iterations
#   sky down   zoonomia-validation                          # only at session end

resources:
    infra: aws/us-east-2
    instance_type: c6id.4xlarge      # 16 vCPU, 32 GB RAM, 950 GB local NVMe
    disk_size: 100
    labels:
        project: dna

workdir: .

# HF CLI reads the token from ~/.cache/huggingface/token.
file_mounts:
    ~/.cache/huggingface: ~/.cache/huggingface

setup: |
    set -euxo pipefail

    if [ ! -d "$HOME/miniforge3" ]; then
        curl -fsSL -o /tmp/miniforge.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
        bash /tmp/miniforge.sh -b -p "$HOME/miniforge3"
        rm /tmp/miniforge.sh
    fi

    if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
    fi

    grep -q 'miniforge3/bin' "$HOME/.bashrc" || \
        echo 'export PATH="$HOME/miniforge3/bin:$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"

    export PATH="$HOME/miniforge3/bin:$HOME/.local/bin:$PATH"
    uv sync

run: |
    set -euxo pipefail

    source "$HOME/miniforge3/etc/profile.d/conda.sh"
    export PATH="$HOME/miniforge3/bin:$HOME/.local/bin:$PATH"
    export CONDA_EXE="$HOME/miniforge3/bin/conda"

    cd snakemake/zoonomia_projection_dataset

    # Clear any stale snakemake lockfile from a prior crash. Safe no-op on a
    # clean working dir (just prints "Unlocked working directory").
    uv run snakemake --profile workflow/profiles/default --unlock || true

    # Dry-run gate first — verify only the new validation/cre/mask jobs are
    # scheduled (genome chain + bigwig + GTF should be S3-resolved no-ops).
    # --rerun-incomplete lets the gate plan around any half-written outputs
    # left by a previous OOM / SIGKILL.
    uv run snakemake --profile workflow/profiles/default \
        --printshellcmds \
        --rerun-incomplete \
        -n all_validation

    # Real run.
    uv run snakemake --profile workflow/profiles/default \
        --use-conda \
        --printshellcmds \
        --rerun-incomplete \
        all_validation
