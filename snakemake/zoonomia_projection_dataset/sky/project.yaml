name: zoonomia-projection-mammals

# Cross-mammal projection step (issue #149, follows benchmark #153).
# Projects results/bed/min0.20.bed.gz onto ~108 family-deduped mammals via
# halLiftover --noDupes against the 1.18 TiB Zoonomia 447 Cactus HAL.
#
# Cluster pattern (memo cloud_launch_conventions + sky_cluster_reuse):
#   sky launch -c zoonomia-project sky/project.yaml --env TIER=smoke
#   sky exec   zoonomia-project   sky/project.yaml --env TIER=full
#   sky down   zoonomia-project    # only at end of session
#
# Smoke (TIER=smoke): ~5 min after staging; 4 species × ~1000 windows; runs
#   the ZRS sanity check; gates the full launch.
# Full (TIER=full): ~5 h wall on c6id.12xlarge (108 species × 1.13 M
#   windows; 48-way species parallelism); ~$12 at $2.42/h.

resources:
    infra: aws/us-east-2
    instance_type: c6id.12xlarge       # 48 vCPU, 96 GB RAM, 2x1425 GB NVMe
    disk_size: 100                      # gp3 root vol; HAL goes on RAID0 NVMe
    labels:
        project: dna

workdir: .

envs:
    TIER: smoke                         # override with --env TIER=full
    TARGET: all_projected               # or all_sequences (v2: hal2fasta + 2bit + per-window FASTA)

setup: |
    set -euxo pipefail

    if [ ! -d "$HOME/miniforge3" ]; then
        curl -fsSL -o /tmp/miniforge.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
        bash /tmp/miniforge.sh -b -p "$HOME/miniforge3"
        rm /tmp/miniforge.sh
    fi
    if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
    fi
    grep -q 'miniforge3/bin' "$HOME/.bashrc" || \
        echo 'export PATH="$HOME/miniforge3/bin:$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"
    export PATH="$HOME/miniforge3/bin:$HOME/.local/bin:$PATH"

    # Cactus pre-built binaries — bundles halLiftover + halStats. No bioconda
    # or conda-forge package exists; the upstream tarball is the recommended
    # path (see ComparativeGenomicsToolkit/cactus BIN-INSTALL.md).
    CACTUS_VERSION=3.1.4
    CACTUS_DIR="$HOME/cactus-bin-v${CACTUS_VERSION}"
    if [ ! -d "$CACTUS_DIR" ]; then
        curl -fsSL -o /tmp/cactus.tar.gz \
            "https://github.com/ComparativeGenomicsToolkit/cactus/releases/download/v${CACTUS_VERSION}/cactus-bin-v${CACTUS_VERSION}.tar.gz"
        tar -xzf /tmp/cactus.tar.gz -C "$HOME"
        rm /tmp/cactus.tar.gz
    fi
    if ! grep -q 'cactus-bin' "$HOME/.bashrc"; then
        echo "export PATH=\"$CACTUS_DIR/bin:\$PATH\"" >> "$HOME/.bashrc"
        echo "export LD_LIBRARY_PATH=\"$CACTUS_DIR/lib:\${LD_LIBRARY_PATH:-}\"" >> "$HOME/.bashrc"
    fi

    uv sync

run: |
    set -euxo pipefail
    source "$HOME/miniforge3/etc/profile.d/conda.sh" 2>/dev/null || true

    # SkyPilot bundles its own aws CLI at /home/ubuntu/skypilot-runtime/bin
    # which is not on the default non-interactive PATH. If we don't export
    # it here, `aws s3 cp` later in this script silently exits 127 (and
    # `aws s3 ls` in `if`-tests false-negatives). See benchmark #153 commit
    # 06ab089.
    export PATH="$HOME/skypilot-runtime/bin:$HOME/miniforge3/bin:$HOME/.local/bin:$HOME/cactus-bin-v3.1.4/bin:$PATH"
    export LD_LIBRARY_PATH="$HOME/cactus-bin-v3.1.4/lib:${LD_LIBRARY_PATH:-}"
    export CONDA_EXE="$HOME/miniforge3/bin/conda"

    command -v aws >/dev/null         || { echo "aws not on PATH"; exit 1; }
    command -v halLiftover >/dev/null || { echo "halLiftover not on PATH"; exit 1; }
    command -v halStats >/dev/null    || { echo "halStats not on PATH"; exit 1; }

    # ----- Mount instance-store NVMes via mdadm RAID0 → /mnt/nvme -----
    # The SkyPilot AWS AMI leaves c6id NVMes at /dev/nvme1n1, /dev/nvme2n1
    # (one per drive) UNMOUNTED; root vol is gp3, only ~100 GB. Combine the
    # NVMes via RAID0 for ~2.6 TB of high-throughput working space.
    if ! mountpoint -q /mnt/nvme; then
        sudo apt-get install -y mdadm
        NVMES=$(lsblk -dn -o NAME,TYPE,MOUNTPOINT | awk '$2=="disk" && $3=="" && $1 ~ /^nvme[1-9]/ {print "/dev/"$1}')
        echo "Instance-store NVMes detected: $NVMES"
        N_NVME=$(echo "$NVMES" | wc -w)
        if [ "$N_NVME" -ge 2 ]; then
            sudo mdadm --create /dev/md0 --level=0 --raid-devices="$N_NVME" $NVMES --force --run
            DEV=/dev/md0
        elif [ "$N_NVME" -eq 1 ]; then
            DEV=$NVMES
        else
            echo "no instance-store NVMe found; falling back to root volume (likely too small for the HAL)"
            DEV=""
        fi
        if [ -n "$DEV" ]; then
            sudo mkfs.ext4 -F -E nodiscard "$DEV"
            sudo mkdir -p /mnt/nvme
            sudo mount -o noatime "$DEV" /mnt/nvme
            sudo chown ubuntu:ubuntu /mnt/nvme
        fi
    fi
    df -h /mnt/nvme || true

    # ----- Stage the 1.18 TiB HAL from S3 mirror -----
    HAL_DIR=/mnt/nvme/zoonomia
    HAL_NAME=447-mammalian-2022v1.hal
    HAL_PATH="$HAL_DIR/$HAL_NAME"
    S3_HAL="s3://oa-bolinas/staging/$HAL_NAME"
    mkdir -p "$HAL_DIR"
    if [ ! -f "$HAL_PATH" ]; then
        if aws s3 ls "$S3_HAL" >/dev/null 2>&1; then
            echo "[hal] staging from S3 mirror"
            aws s3 cp "$S3_HAL" "$HAL_PATH"
        else
            echo "ERROR: HAL not at $S3_HAL — re-mirror from UCSC if needed"
            exit 1
        fi
    fi
    ls -la "$HAL_PATH"

    # ----- Symlink _genomes_fa to NVMe so 320 GB of hal2fasta output lands
    #       there, not on the 100 GB gp3 root vol. local() in Snakemake
    #       only skips S3 upload — it does NOT redirect the on-disk path,
    #       so the working-directory-relative output would otherwise fill
    #       the root vol and crash the scheduler with "No space left".
    GENOMES_FA_NVME=/mnt/nvme/zoonomia/_genomes_fa
    mkdir -p "$GENOMES_FA_NVME"
    GENOMES_FA_LINK="snakemake/zoonomia_projection_dataset/results/projection/_genomes_fa"
    mkdir -p "$(dirname "$GENOMES_FA_LINK")"
    if [ ! -L "$GENOMES_FA_LINK" ]; then
        rm -rf "$GENOMES_FA_LINK"
        ln -sfn "$GENOMES_FA_NVME" "$GENOMES_FA_LINK"
    fi
    ls -la "$GENOMES_FA_LINK"

    # ----- Run Snakemake: project_one_species ║×48 + merge -----
    cd snakemake/zoonomia_projection_dataset
    uv run --project ../.. snakemake "$TARGET" \
        --profile workflow/profiles/default \
        --use-conda \
        --cores 48 \
        --resources mem_mb=90000 \
        --rerun-incomplete \
        --printshellcmds \
        --config hal_path="$HAL_PATH" tier="$TIER"
