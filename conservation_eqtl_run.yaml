# Re-run conservation_eval scoring + aggregation for eqtl only (after the
# PIP labeling bug fix updates `bolinas-dna/evals_eqtl` on HF). The existing
# mendelian_traits / complex_traits HF datasets are unchanged so we leave
# their cached metrics alone.

name: conservation-eqtl

resources:
    infra: aws/us-east-2
    cpus: 4+
    memory: 16+
    disk_size: 100
    labels:
        project: dna

workdir: .

setup: |
    set -euxo pipefail
    if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
    fi
    export PATH="$HOME/.local/bin:$PATH"
    uv sync

run: |
    set -euxo pipefail
    export PATH="$HOME/.local/bin:$PATH"
    cd snakemake/conservation_eval

    # Target only eqtl outputs. `--forcerun score_variants` forces re-fetch
    # of the eval dataset from HF (no provenance fingerprint otherwise).
    # `--cores 1` because each score_variants task loads a ~10 GB bigWig.
    uv run --project ../.. snakemake \
        --profile workflow/profiles/default \
        --cores 1 \
        --printshellcmds \
        --rerun-incomplete \
        --forcerun score_variants \
        -- \
        results/eqtl/metrics_train.parquet \
        results/eqtl/metrics_test.parquet
