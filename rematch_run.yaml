name: rematch-iter

workdir: .

resources:
  infra: aws/us-east-2
  cpus: 16+
  memory: 128+
  disk_size: 100
  labels:
    project: dna

setup: |
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir
  uv sync --quiet

run: |
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir
  uv run python snakemake/evals/scratch/rematch_per_biotype.py
