name: all-three-unsplit

workdir: .

resources:
  infra: aws/us-east-2
  cpus: 16+
  memory: 128+
  disk_size: 200
  labels:
    project: dna

# eqtl_download still pulls from Requester-Pays GCS; gcloud creds needed.
file_mounts:
  ~/.config/gcloud: ~/.config/gcloud

setup: |
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env 2>/dev/null || true
  if ! command -v gsutil >/dev/null 2>&1; then
    curl -sSL https://sdk.cloud.google.com | bash -s -- --disable-prompts >/dev/null
  fi
  echo 'export PATH="$HOME/google-cloud-sdk/bin:$PATH"' >> ~/.bashrc
  cd ~/sky_workdir
  uv sync --quiet

run: |
  source $HOME/.local/bin/env 2>/dev/null || true
  export PATH="$HOME/google-cloud-sdk/bin:$PATH"
  cd ~/sky_workdir/snakemake/evals
  # --rerun-triggers=mtime keeps cached upstream outputs intact when only
  # downstream code changed; the dual-distance switch updates dataset_all
  # rules' inputs, so those will re-run automatically.
  # --cores 1 forces sequential per-rule execution: previous run with --cores 4
  # OOM-killed the instance because complex_traits_dataset_all + mendelian_traits_dataset_all
  # ran in parallel and each does 4 pb.nearest joins on big dataframes
  # under the dual-distance design.
  # --forcerun for the dataset_all + dataset rules: their schema changed (new
  # distance_*_pc/nc columns), so any older parquets on S3 must be rebuilt.
  uv run snakemake \
    --cores 1 \
    -p \
    --rerun-triggers=mtime \
    --forcerun \
      mendelian_traits_dataset_all mendelian_traits_dataset \
      complex_traits_dataset_all complex_traits_dataset \
      eqtl_dataset_all eqtl_dataset \
    -- \
    results/dataset_unsplit/mendelian_traits.parquet \
    results/dataset_unsplit/complex_traits.parquet \
    results/dataset_unsplit/eqtl.parquet
