name: eqtl-catalogue-build

workdir: .

resources:
  infra: aws/us-east-2
  cpus: 8+
  # Per-tissue parses with eGene list aggregation use 20-40 GB peak each
  # — list-typed `positive_genes` / `positive_biotype_classes` aggregates
  # don't stream cleanly (polars materializes most of the pre-agg frame).
  # 4 parallel × 40 GB = 160 GB; 128 GB cluster OOM'd previously. 256 GB
  # gives headroom.
  memory: 256+
  # 49 tissues × 3.5 GB nominal sumstats transit through tempdir
  # (concurrent: 4 in flight ≈ 14 GB) + 5 GB cached parquet output.
  disk_size: 300
  labels:
    project: dna

# No GCP / Requester-Pays creds needed — eQTL Catalogue is anonymous FTP.

setup: |
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir
  uv sync --quiet

run: |
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir/snakemake/evals
  # --cores 4: per-tissue parses use ~20-40 GB peak each (gene-granularity
  # list-col aggregation doesn't stream); 4-way parallel ≈ 160 GB, leaves
  # 96 GB headroom on the 256 GB box.
  # `--restart-times 3` auto-retries transient FTP / Ray hiccups.
  # No `--forcerun` here: re-running the yaml from scratch should be
  # idempotent against cached parquets. Add `--forcerun eqtl_parse_per_tissue`
  # locally (and bump the cluster yaml) only when changing the per-tissue
  # parquet schema, which would otherwise rebuild 170 GB of FTP downloads.
  uv run snakemake \
    --cores 4 \
    -p \
    --rerun-triggers=mtime \
    --rerun-incomplete \
    --restart-times 3 \
    -- results/dataset_unsplit/eqtl.parquet
