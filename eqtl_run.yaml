name: eqtl-catalogue-build

workdir: .

resources:
  infra: aws/us-east-2
  cpus: 8+
  # 256 GB: per-tissue parses with eGene list aggregation use 20-40 GB
  # peak each (the list-typed `positive_genes` / `positive_biotype_classes`
  # aggregates don't stream cleanly — polars materializes most of the
  # pre-agg DataFrame). 4 parallel × 40 GB peak = 160 GB; 128 GB cluster
  # OOM'd. r6i.8xlarge with 256 GB gives comfortable headroom.
  memory: 256+
  # 49 tissues × 3.5 GB nominal sumstats transit through tempdir
  # (concurrent: 4 in flight ≈ 14 GB) + 5 GB per-tissue parquets cached
  # locally before S3 upload. 300 GB disk is plenty.
  disk_size: 300
  labels:
    project: dna

# No GCP / Requester-Pays creds needed — eQTL Catalogue is anonymous FTP.

setup: |
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir
  uv sync --quiet

run: |
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir/snakemake/evals
  # Round 2-2 of #156: per-tissue parser now emits `positive_genes` +
  # `positive_biotype_classes` list columns (eGene metadata). Schema
  # change → force-rerun the per-tissue parses, which cascades through
  # aggregate / annotate / dataset_all / dataset.
  # --cores 4 (not 8): per-tissue parses at (variant, gene_id) granularity
  # use ~10–20 GB peak each. 4-way parallel × 128 GB = 32 GB headroom per
  # worker; 8-way OOM'd at 128 GB (Ray killed worker at 119 GB / 124 GB).
  uv run snakemake \
    --cores 4 \
    -p \
    --rerun-triggers=mtime \
    --rerun-incomplete \
    --forcerun eqtl_parse_per_tissue \
    -- results/dataset_unsplit/eqtl.parquet
