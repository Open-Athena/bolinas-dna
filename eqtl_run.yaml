name: eqtl-catalogue-build

workdir: .

resources:
  infra: aws/us-east-2
  cpus: 8+
  # 128 GB safety margin for `eqtl_aggregate_tissues`. The streaming
  # group_by on ~500M concat'd rows (49 × ~10M per tissue) OOM'd at 64 GB.
  # The per-chrom chunking in the rule already bounds memory to ~5–10 GB
  # per pass; the extra headroom is for polars' working memory.
  memory: 128+
  # 49 tissues × 3.5 GB nominal sumstats transit through tempdir
  # (concurrent: 8 in flight ≈ 30 GB) + 5 GB per-tissue parquets cached
  # locally before S3 upload. 300 GB gives comfortable slack.
  disk_size: 300
  labels:
    project: dna

# No GCP / Requester-Pays creds needed — eQTL Catalogue is anonymous FTP.

setup: |
  command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir
  uv sync --quiet

run: |
  source $HOME/.local/bin/env 2>/dev/null || true
  cd ~/sky_workdir/snakemake/evals
  # Round-2 of #156: matching code changed (add_subset_distance_bins +
  # include_ncrna_tss_nc_bin=True for eqtl). Upstream `dataset_all.parquet`
  # is unchanged, so only `--forcerun eqtl_dataset` needs to re-run.
  uv run snakemake \
    --cores 8 \
    -p \
    --rerun-triggers=mtime \
    --forcerun eqtl_dataset \
    -- results/dataset_unsplit/eqtl.parquet
