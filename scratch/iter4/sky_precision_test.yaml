# SkyPilot task: iter-4 precision test — fp32 FWD + RC scout for exp58-mammals × mendelian.
# Compare against existing bf16 FWD (iter-1) and bf16 RC (iter-4) baselines to see whether
# bf16 numerical noise is a meaningful contributor to the FWD-vs-RC redundancy gap.

name: iter4-precision

resources:
    infra: aws/us-east-2
    accelerators: A10G:1
    disk_size: 100
    labels:
        project: dna

workdir: .

file_mounts:
    ~/.config/gcloud/application_default_credentials.json: ~/.config/gcloud/application_default_credentials.json

setup: |
    set -euxo pipefail
    if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
    fi
    if ! command -v gcloud >/dev/null 2>&1; then
        curl -fsSL https://sdk.cloud.google.com > /tmp/gcloud-install.sh
        bash /tmp/gcloud-install.sh --disable-prompts --install-dir="$HOME"
    fi
    grep -q 'google-cloud-sdk/bin' "$HOME/.bashrc" || \
        echo 'export PATH="$HOME/google-cloud-sdk/bin:$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"
    export PATH="$HOME/google-cloud-sdk/bin:$HOME/.local/bin:$PATH"
    export GOOGLE_APPLICATION_CREDENTIALS="$HOME/.config/gcloud/application_default_credentials.json"
    uv sync
    uv pip install --reinstall --no-deps torch==2.5.1+cu121 --index-url https://download.pytorch.org/whl/cu121
    uv pip install --no-deps nvidia-nccl-cu12==2.21.5 nvidia-cublas-cu12==12.1.3.1 nvidia-cudnn-cu12==9.1.0.70
    .venv/bin/python -c 'import torch; assert torch.cuda.is_available()'
    gcloud storage ls gs://marin-dna-us-central1/checkpoints/ | head -3 >/dev/null

run: |
    set -euxo pipefail
    export PATH="$HOME/google-cloud-sdk/bin:$HOME/.local/bin:$PATH"
    export GOOGLE_APPLICATION_CREDENTIALS="$HOME/.config/gcloud/application_default_credentials.json"
    export WANDB_DISABLED=true

    mkdir -p ~/iter4_data/exp58-mammals
    if [ ! -f ~/iter4_data/exp58-mammals/model.safetensors ]; then
        gcloud storage cp -r 'gs://marin-dna-us-central1/checkpoints/exp58-mammals-r01-23d451/hf/step-16999/*' ~/iter4_data/exp58-mammals/
    fi
    if [ ! -f ~/iter4_data/genome.fa.gz ]; then
        wget -q -O ~/iter4_data/genome.fa.gz \
            'http://ftp.ensembl.org/pub/release-113/fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz'
    fi

    mkdir -p ~/iter4_out

    # fp32 FWD pass
    echo "=== Precision test: exp58-mammals FWD fp32 ==="
    .venv/bin/python scratch/zeroshot_vep_iter4_precision_scout.py \
        --checkpoint ~/iter4_data/exp58-mammals \
        --genome ~/iter4_data/genome.fa.gz \
        --window 256 \
        --dataset mendelian_traits \
        --batch-size 8 \
        --strand fwd \
        --dtype fp32 \
        --out ~/iter4_out/iter4_fwd_fp32_exp58-mammals__win256__mendelian_traits.parquet

    # fp32 RC pass
    echo "=== Precision test: exp58-mammals RC fp32 ==="
    .venv/bin/python scratch/zeroshot_vep_iter4_precision_scout.py \
        --checkpoint ~/iter4_data/exp58-mammals \
        --genome ~/iter4_data/genome.fa.gz \
        --window 256 \
        --dataset mendelian_traits \
        --batch-size 8 \
        --strand rc \
        --dtype fp32 \
        --out ~/iter4_out/iter4_rc_fp32_exp58-mammals__win256__mendelian_traits.parquet

    echo "[precision] DONE."
    ls -la ~/iter4_out/iter4_*_fp32_*
