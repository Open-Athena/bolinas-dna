# SkyPilot task: iter-4 generalist 1B eval — exp166-p1B (zoonomia whole-genome, 1B Qwen3)
# Pulled from HF Hub at bolinas-dna/exp166-p1B-step-16398. Window 255 + BOS.

name: iter4-exp166-1b

resources:
    infra: aws/us-east-2
    accelerators: A10G:1
    disk_size: 100
    labels:
        project: dna

workdir: .

setup: |
    set -euxo pipefail
    if ! command -v uv >/dev/null 2>&1; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
    fi
    grep -q '/.local/bin' "$HOME/.bashrc" || \
        echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"
    export PATH="$HOME/.local/bin:$PATH"
    uv sync
    uv pip install --reinstall --no-deps torch==2.5.1+cu121 --index-url https://download.pytorch.org/whl/cu121
    uv pip install --no-deps nvidia-nccl-cu12==2.21.5 nvidia-cublas-cu12==12.1.3.1 nvidia-cudnn-cu12==9.1.0.70
    .venv/bin/python -c 'import torch; assert torch.cuda.is_available()'

run: |
    set -euxo pipefail
    export PATH="$HOME/.local/bin:$PATH"
    export WANDB_DISABLED=true

    # Just download the genome (model comes from HF Hub directly).
    mkdir -p ~/iter4_data
    if [ ! -f ~/iter4_data/genome.fa.gz ]; then
        wget -q -O ~/iter4_data/genome.fa.gz \
            'http://ftp.ensembl.org/pub/release-113/fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz'
    fi

    mkdir -p ~/iter4_out

    # FWD bf16, win=255 + BOS
    echo "=== exp166-p1B FWD bf16, win=255 ==="
    .venv/bin/python scratch/zeroshot_vep_iter4_precision_scout.py \
        --checkpoint bolinas-dna/exp166-p1B-step-16398 \
        --genome ~/iter4_data/genome.fa.gz \
        --window 255 \
        --dataset mendelian_traits \
        --batch-size 4 \
        --strand fwd \
        --dtype bf16 \
        --out ~/iter4_out/iter4_fwd_exp166-p1B__win255__mendelian_traits.parquet

    # RC bf16, win=255 + BOS
    echo "=== exp166-p1B RC bf16, win=255 ==="
    .venv/bin/python scratch/zeroshot_vep_iter4_precision_scout.py \
        --checkpoint bolinas-dna/exp166-p1B-step-16398 \
        --genome ~/iter4_data/genome.fa.gz \
        --window 255 \
        --dataset mendelian_traits \
        --batch-size 4 \
        --strand rc \
        --dtype bf16 \
        --out ~/iter4_out/iter4_rc_exp166-p1B__win255__mendelian_traits.parquet

    echo "[iter4-exp166-1b] DONE."
    ls -la ~/iter4_out/iter4_*_exp166*
